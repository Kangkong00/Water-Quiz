  {id:494,subject:3,exam:'2018-04',text:'폐수의 고도처리에 관한 다음의 기술 중 옳지 않은 것은?',choices:['Cl-, SO42- 등의 무기염류의 제거에는 전기투석법이 이용된다.','활성탄 흡착법에서 폐수 중의 인산은 제거되지 않는다.','모래여과법은 고도처리 중에서 흡착법이나 전기투석법의 전처리로써 이용된다.','폐수 중의 무기성질소 화합물은 철염에 의한 응집침전으로 완전히 제거된다.'],answer:2,explain:'폐수속의 질소화합물은 가스로 날려서 제거하고 침전제거하지 않는다 (3.05-1.00)mg/L×80.1/71×4350m3/day 아황산염:염소 1:1 몰비로 반응 아황산염 분자량80.1 염소 분자량71',calc:false},
  {id:495,subject:3,exam:'2018-04',text:'슬러지의 열처리에 대해 기술한 것으로 옳지 않은 것은?',choices:['슬러지의 열처리는 탈수의 전처리로서 한다.','슬러지의 열처리에 의해, 슬러지의 탈수성과 침강성이 좋아진다.','슬러지의 열처리에 의해, 슬러지 중의 유기물이 가수분해되어 가용화된다.','슬러지의 열처리에 의한 분리액은 BOD가 낮으므로 그대로 방류할 수 있다.'],answer:3,explain:'열처리 시 BOD가 높아지는 단점이 있다 표면 부하율 =Q/A=H/t=4m/1.92hr×24hr/day=50m/day',calc:false},
  {id:496,subject:3,exam:'2018-04',text:'수질 성분이 부식에 미치는 영향으로 틀린 것은?',choices:['높은 알칼리도는 구리와 납의 부식을 증가시킨다.','암모니아는 착화물 형성을 통해 구리, 납 등의 금속용해도를 증가시킬 수 있다.','잔류염소는 Ca와 반응하여 금속의 부식을 감소시킨다.','구리는 갈바닉 전지를 이룬 배관상에 흠집(구멍)을 야기한다.'],answer:1,explain:'잔류염소는 용존산소와 반응해서 금속부식을 활성화 시킨다. In(10/100)=-K*5min K=0.7675/min In(5/100)=-0.7675*t',calc:false},
  {id:497,subject:3,exam:'2018-04',text:'하수로부터 인 제거를 위한 화학제의 선택에 영향을 미치는 인자가 아닌 것은?',choices:['유입수의 인 농도','슬러지 처리시설','알칼리도','다른 처리공정과의 차별성'],answer:3,explain:'화학제의 선택에 영향을 미치는 인자 : 유입수의 인농도, 슬러지 처리시설, 알칼리도, 다른 처리공정과 호환성',calc:false},
  {id:498,subject:3,exam:'2018-04',text:'무기수은계 화합물을 함유한 폐수의 처리방법이 아닌 것은?',choices:['황화물 침전법','활성탄 흡착법','산화분해법','이온교환법'],answer:2,explain:'수은을 산화시킨다고 수은이 없어지지 않아요 총용존고형물이 증가합니다.',calc:false},
  {id:499,subject:4,exam:'2018-04',text:'질소 제거를 위한 파괴점 염소 주입법에 관한 설명과 가장 거리가 먼 것은?',choices:['적절한 운전으로 모든 암모니아성 질소의 산화가 가능하다.','시설비가 낮고 기존 시설에 적용이 용이하다.','수생생물에 독성을 끼치는 잔류염소농도가 높아진다.','독성물질과 온도에 민감하다.'],answer:3,explain:'4번은 생물학적 처리법 Ci×Q-CQ-Vk(C^0.5)=0 V=500L/h×(250-0.05×250)mg/L÷(0.05×(250×0.05)^(0.5))=671m3',calc:false},
  {id:500,subject:4,exam:'2018-04',text:'수질분석용 시료의 보존 방법에 관한 설명 중 틀린 것은?',choices:['6가 크롬분석용 시료는 c-HNO3 1mL/L를 넣어 보관한다.','페놀분석용 시료는 인산을 넣어 pH 4 이하로 조정한 후, 황산구리 (1g/L)를 첨가하여 4°C에서 보관','시안 분석용 시료는 수산화나트륨으로 pH 12 이상으로 하여 4°C 에서 보관한다.','화학적산소요구량 분석용 시료는 황산으로 pH 2 이하로 하여 4°C에서 보관한다.'],answer:1,explain:'6가크롬은 4℃에서 보관 글루코오즈 및 글루탐산 용액으로 측정하여 얻은 BOD 값은 200±30 mg/L 의 범위 안에 있어야 하는 것 이 맞습니다. 따라서 범위는 170 ~ 230 범위를 벗어난 틀린 답을 고르시면 됩니다.',calc:false},
  {id:501,subject:4,exam:'2018-04',text:'불소 측정시험 시 수증기 증류법으로 전처리하지 않아도 되는 것은?',choices:['색도가 30도인 시료','P043-의 농도가 4mg/L인 시료','Al3+의 농도가 2mg/L인 시료','Fe2+의 농도가 7mg/L인 시료'],answer:3,explain:'해당 문제의 내용은 공정시험 기준에도 포함되어 있지 않는 것으로 18년도 당시엔 이의신청이 받아들여 지지 않은 것으로 알고 있습니다. 공정시험 기준 중 불소 항목에 "알류미늄 및 철의 방해가 크나 증류하면 영향이 없다." 라는 항목만 있을 뿐 전처리로 배제하는 물질의 명칭과 그 농도에 대한 명시는 되어있지 않습니다.',calc:false},
  {id:502,subject:4,exam:'2018-04',text:'전기전도도의 정밀도 기준으로 ( )에 옳은 것은?',choices:['15%','20%','25%','30%'],answer:1,explain:'전기 전도도의 정밀도의 기준은, 표준편차 20% 이내이다. pH 순서(왼쪽에서 오른쪽으로 높아짐) 옥살산염<프탈산염<인산염<붕산염<탄산염<수산화칼슘',calc:false},
  {id:503,subject:4,exam:'2018-04',text:'20°C 이하에서 BOD 측정 시료의 용존산소가 과포화되어 있을 때 처리하는 방법은?',choices:['시료의 산소 과포화되어 있어도 배양전 용존 산소 값으로 측정됨으로 상관이 없다.','시료의 수온을 23~25°C로 하여 15분간 통기하고 방냉한 후 수온을 20°C로 한다.','아황산나트륨을 적당량 넣어 산소를 소모시킨다.','5°C 이하로 냉각시켜 냉암소에서 15분간 잘 저어준다.'],answer:1,explain:'2번이 정답입니다.',calc:false},
  {id:504,subject:4,exam:'2018-04',text:'자외선/가시선 분광법을 적용하여 페놀류를 측정할 때 사용되는 시약은?',choices:['4-아미노안티피린','인도 페놀','O-페난트로린','디티죤'],answer:0,explain:'자외선/가시선분광법 4-아미노안티피린 : 페놀류측정에사용 인도페놀 : 암모니아성질소 분석에서의 측정물질 o-페난트로닌 : 철 측정에 사용',calc:false},
  {id:505,subject:4,exam:'2018-04',text:'수질오염공정시험기준상 기체크로마토그래피법으로 정량하는 물질은?',choices:['불소','유기인','수은','비소'],answer:1,explain:'기체크로마토그래피로 정량하는 물질 알킬수은, 유기인, PCB, 석유계 총탄화수소, 휘발성 유기화합물, 1, 4-다이옥산, 다이에틸헥실프탈레이 트, 포름알데하이드, 염화비닐 아크릴로니트릴, 브로모폼, 나프탈렌 등',calc:false},
  {id:506,subject:4,exam:'2018-04',text:'\'항량으로 될 때까지 강열한다.\'는 의미에 해당하는 것은?',choices:['강열할 때 전후무게의 차가 g당 0.1mg 이하일 때','강열할 때 전후무게의 차가 g당 0.3mg 이하일 때','강열할 때 전후무게의 차가 g당 0.5mg 이하일 때','강열할 때 전후무게의 차가 없을 때'],answer:1,explain:'2번이 정답입니다.',calc:false},
  {id:507,subject:4,exam:'2018-04',text:'온도에 관한 내용으로 옳지 않는 것은?',choices:['찬 곳은 따로 규정이 없는 한 0~15°C의 곳을 뜻한다.','냉수는 15°C이하를 말한다.','온수는 70~90°C를 말한다.','상온은 15~25°C를 말한다.'],answer:2,explain:'3. 온수는 60~70°C',calc:false},
  {id:508,subject:4,exam:'2018-04',text:'흡광 광도 측정에서 입사광의 60%가 흡수되었을 때의 흡광도는?',choices:['약 0.6','약 0.5','약 0.4','약 0.3'],answer:2,explain:'A = log(1/1-0.01*입사광) = log(1/0.4) = 0.3979',calc:false},
  {id:509,subject:4,exam:'2018-04',text:'자외선/가시선 분광법을 이용한 철의 정량에 관한 내용으로 틀린 것은?',choices:['등적색 철착염의 흡광도를 측정하여 정량한다.','측정파장은 510nm이다.','염산 히드록실아민에 의해 산화제이철로 산화된다.','철이온을 암모니아 알칼리성으로 하여 수산화제이철로 침전분리 한다.'],answer:1,explain:'염화히드록실아민에 의해 제일철로 환원 부유고형물=건조, 휘발성=소각 부유고형물=(1.5553-1.5433)g/50ml=240mg/L',calc:false},
  {id:510,subject:4,exam:'2018-04',text:'다음 중 용량분석법으로 측정하지 않는 항목은?',choices:['용존산소','부유물질','화학적산소요구량','염소이온'],answer:1,explain:'부유물질은 중량법으로 한다.',calc:false},
  {id:511,subject:4,exam:'2018-04',text:'시료 채취 시 유의사항으로 틀린 것은?',choices:['채취 용기는 시료를 채우기 전에 시료로 3회 이상 씻은 다음 사용한다.','시료 채취 용기에 시료를 채울 때에는 어떠한 경우에도 시료의 교란이 일어나서는 안 된다.','지하수 시료는 취수정 내에 고여 있는 물과 원래 지하수의 성상이 달라질 수 있으므로 고여 있는 물','시료채취량은 시험항목 및 시험횟수의 필요량의 3~5배 채취를 원칙으로 한다.'],answer:3,explain:'시료채취량은 시험항목 및 시험횟수의 필요량의 3~5L 채취를 원칙으로 한다.',calc:false},
  {id:512,subject:1,exam:'2018-03',text:'비점오염저감시설의 설치와 관련된 사항으로 틀린 것은?',choices:['도시의 개발, 산업단지의 조성 등 사업을 하는 자는 환경부령이 정하는 기간 내에 비점오염저감시설','강우유출수의 오염도가 항상 배출허용기준 이내로 배출되는 사업장은 비점오염저감시설을 설치하지','한강대권역의 완충저류시설에 유입하여 강우유출수를 처리할 경우 비점오염저감 시설을 설치하지','대통령령으로 정하는 규모 이상의 사업장에 제철시설, 섬유염색시설, 그 밖에 대통령령으로 정하는'],answer:2,explain:'[물환경보전법 제53조] 한강대권역의 완충저류시설에 유입하여 강우유출수를 처리할 경우 비점오염저감시설을 \'설치해야 한다\' 11월1일부터 다음연도 1월31일꺼지에 해당하는경우 가동시작일부터 70일 그외의 달에는 50일 수질원격감시체계 관제센터를 설치,운영하는 곳',calc:false},
  {id:513,subject:1,exam:'2018-03',text:'수자원의 순환에서 가장 큰 비중을 차지하는 것은?',choices:['해양으로의 강우','증발','증산','육지로의 강우'],answer:1,explain:'수자원의 순환에서 가장 큰 비중을 차지하는것은 증발이다.',calc:false},
  {id:514,subject:1,exam:'2018-03',text:'C2H615g이 완전히 산화하는데 필요한 이론적 산소량(g)은?',choices:['약 46','약 56','약 66','약 76'],answer:3,explain:'C2H6 + 7/2O2 -> 2CO2 + 3H2O 30   :       112 15   :       X 따라서 X는 56',calc:false},
  {id:515,subject:1,exam:'2018-03',text:'하천의 자정계수(f)에 관한 설명으로 맞는 것은? (단, 기타 조건은 같다고 가정함)',choices:['수온이 상승할수록 자정계수는 작아진다.','수온이 상승할수록 자정계수는 커진다.','수온이 상승하여도 자정계수는 변화가 없이 일정하다.','수온이 20℃인 경우, 자정계수는 가장 크며 그 이상의 수온에서는 점차로 낮아진다.'],answer:3,explain:'자정계수는 수온이 상승할수록 작아짐 KT=K20×1.047^(T-20) =0.1/day×1.047^(10-20) =0.0632/day',calc:false},
  {id:516,subject:1,exam:'2018-03',text:'다음 설명과 가장 관계있는 것은?',choices:['박테리아','균류','조류','원생동물'],answer:1,explain:'유리산소가 존재해야한다는 것은 호기성이라는 뜻. (혐기성은 결합산소가 존재.) pH 낮은 곳에서도 자라는 것은 균류',calc:false},
  {id:517,subject:1,exam:'2018-03',text:'Formaldehyde(CH2O)의 COD/TOC비는?',choices:['1.37','1.67','2.37','2.67'],answer:2,explain:'32/12 = 2.67 이 정도는 그냥 2.67이라고 외우자 실제 시험에서 가답안 발표시 1번으로 발표되었지만 확정답안 발표시 3번으로 정정 발표되었습니다.',calc:false},
  {id:518,subject:1,exam:'2018-03',text:'수질오염물질 중 중금속에 관한 설명으로 틀린 것은?',choices:['카드뮴 : 인체 내에서 투과성이 높고 이동성이 있는 독성 메틸 유도체로 전환된다.','비소 : 인산염 광물에 존재해서 인 화합물 형태로 환경 중에 유입된다.','납 : 급성독성은 신장, 생식계통, 간 그리고 뇌와 중추신경계에 심각한 장애를 유발한다.','수은 : 수은 중독은 BAL, Ca2EDTA로 치료할 수 있다.'],answer:0,explain:'인체 내에서 투과성이 높고 이동성이 있는 독성 메틸 유도체로 전환된다 → 수은',calc:false},
  {id:519,subject:1,exam:'2018-03',text:'분뇨를 퇴비화 처리할 때 초기의 최적 환경조건으로 가장 거리가 먼 것은?',choices:['축분에 수분조정을 위해 부자재를 혼합할 때 퇴비재료의 적정 C/N비는 25~30이 좋다.','부자재를 혼합하여 수분함량이 20~30% 되로록 한다.','퇴비화는 호기성미생물을 활용하는 기술이므로 산소공급을 충분히 한다.','초기 재료의 pH는 6.0~8.0으로 조정한다.'],answer:1,explain:'수분함량이 50~60퍼가 되도록 함',calc:false},
  {id:520,subject:1,exam:'2018-03',text:'부영양화 현상을 억제하는 방법으로 가장 거리가 먼 것은?',choices:['비료나 합성세제의 사용을 줄인다.','축산폐수의 유입을 막는다.','과잉번식된 조류(algae)는 황산망간(MnSO4)을 살포하여 제거 또는 억제할 수 있다.','하수처리장에서 질소와 인을 제거하기 위해 고도처리공정을 도입하여 질소, 인의 호소유입을 막는'],answer:2,explain:'황산동(CuSo4)',calc:false},
  {id:521,subject:2,exam:'2018-03',text:'보통 농업용수의 수질평가 시 SAR로 정의하는데 이에 대한 설명으로 틀린 것은?',choices:['SAR값이 20정도이면 Na+가 토양에 미치는 영향이 적다.','SAR의 값은 Na+, Ca2+, Mg2+ 농도와 관계가 있다.','경수가 연수보다 토양에 더 좋은 영향을 미친다고 볼 수 있다.','SAR의 계산식에 사용되는 이온의 농도는 meq/L를 사용한다.'],answer:2,explain:'Sar 0~10 영향적음 10~18 중간 정도 영향 18~26 비교적 큰 영향',calc:false},
  {id:522,subject:2,exam:'2018-03',text:'펌프의 공동현상(Cavitation)에 관한 설명 중 틀린 것은?',choices:['공동현상이 생기면 소음이 발생한다.','공동 속의 압력은 절대로 0이 되지는 않는다.','장시간이 경화하면 재료의 침식을 생기게 한다.','펌프의 흡입양정이 작아질수록 공동현상이 발생하기 쉽다.'],answer:1,explain:'펌프의 흡입양정이 커질수록 필요유효흡입수두가 커지므로 공동현상이 발생되기 쉽다. Q=A*V A=파이*D^2/4',calc:false},
  {id:523,subject:2,exam:'2018-03',text:'하수관거 개ㆍ보수계획 수립 시 포함되어야 할 사항이 아닌 것은?',choices:['불명수량 조사','개ㆍ보수 우선순위의 결정','개ㆍ보수공사 점위의 설정','주변 인근 신설관거 현황 조사'],answer:3,explain:'Q1=Q2 ,  Q=A*V -> A1V1 = A2V2 , A=pi*d^2/4 이므로 [pi*(0.5^2)/4]*2 = [pi*(0.2^2)/4]*X X = 12.5m/s',calc:false},
  {id:524,subject:2,exam:'2018-03',text:'상수도 최수시설 중 취수틀에 관한 설명으로 옳지 않은 것은?',choices:['구조가 간단하고 시공도 비교적 용이하다.','수중에 설치되므로 호소표면수는 취수할 수 없다.','단기간에 완성하고 안정된 취수가 가능하다.','보통 대형취수에 사용되며 수위변화에 영향이 적다.'],answer:3,explain:'중소량 취수에 이용된다',calc:false},
  {id:525,subject:2,exam:'2018-03',text:'다음 하수관로에서 평균유속이 2.5m/sec일 때 흐르는 유량(m3/sec)은?',choices:['7.8','12.3','17.5','23.3'],answer:0,explain:'면적구하는거 평행사변형 공식쓰면돼요 윗변더하기밑변 곺하기 높이 나누기2 ->Q/V = 파이*d^2/4 H=I*L+b*(v^2/2g)+a 공식을 적용하시면 됩니다.g = 9.8m/s^2(중력가속도)',calc:false},
  {id:526,subject:2,exam:'2018-03',text:'하수배제방식이 합류식인 경우 중계펌프장의 계획 하수량으로 가장 옳은 것은?',choices:['우천시 계획오수량','계획우수량','계획시간최대오수량','계획1일최대오수량'],answer:0,explain:'계획 우수량 : 분류식 빗물펌프장 계획시간최대오수량 : 분류식 중계펌프장, 처리장내 펌프장 합류식 빗물 펌프장 : 계획하수량 - 강우시 계획오수량',calc:false},
  {id:527,subject:2,exam:'2018-03',text:'우물의 양수량 결정 시 적용되는 “적정양수량”의 정의로 옳은 것은?',choices:['최대양수량의 70% 이하','최대양수량의 80% 이하','한계양수량의 70% 이하','한계양수량의 80% 이하'],answer:0,explain:'한계 양수량의 70% 이하',calc:false},
  {id:528,subject:2,exam:'2018-03',text:'계획송수량과 계획도수량의 기준이 되는 수량은?',choices:['계획송수량 : 계획1일최대급수량','계획송수량 : 계획시간최대급수량','계획송수량 : 계획취수량','계획송수량 : 계획1일최대급수량'],answer:3,explain:'취수, 정수, 송수 : 계획1일최대급수량 도수 : 계획취수량 배수 : 계획시간 최대급수량',calc:false},
  {id:529,subject:2,exam:'2018-03',text:'정수처리시설인 응집지 내의 플록형성지에 관한 설명 중 틀린 것은?',choices:['플록형성지는 혼화지와 침전지 사이에 위치하고 침전지에 붙여서 설치한다.','플록형성은 응집된 미소플록을 크게 성장시키기 위해 적당한 기계식교반이나 우류식교반이 필요하','플록형성지 내의 교반강도는 하류로 갈수록 점차 증가시키는 것이 바람직하다.','플록형성지는 단락류나 정체부가 생기지 않으면서 충분하게 교반될 수 있는 구조로 한다.'],answer:3,explain:'하류로 갈 수록 감소해야해요',calc:false},
  {id:530,subject:2,exam:'2018-03',text:'취수시설 중 취수보의 위치 및 구조에 대한 고려사항으로 옳지 않은 것은?',choices:['유심이 취수구에 가까우며 안정되고 홍수에 의한 하상변화가 적은 지점으로 한다.','원칙적으로 철근콘크리트 구조로 한다.','침수 및 홍수시 수면상승으로 인하여 상류에 위치한 하천공작물 등에 미치는 영향이 적은 지점에 설','원칙적으로 홍수의 유심방향과 평행인 직선형으로 가능한 한 하천의 곡선부에 설치한다.'],answer:1,explain:'원칙적으로 홍수의 \'유심방향\'과 직각의 직선형으로 가능한 한 하천의 \'직선부\'에 설치함 1200m×2/1000=2.4m',calc:false},
  {id:531,subject:2,exam:'2018-03',text:'도수관을 설계할 때 평균유속 기준으로 옳은 것은?',choices:['㉠ 1.5 m/s, ㉡ 0.3 m/s','㉠ 1.5 m/s, ㉡ 0.6 m/s','㉠ 3.0 m/s, ㉡ 0.3 m/s','㉠ 3.0 m/s, ㉡ 0.6 m/s'],answer:2,explain:'도수관거 최소 0.3 최대 3 합류 및 우수관거 최소 0.8 최대 3 오수관거 최소 0.6 최대 3',calc:false},
  {id:532,subject:2,exam:'2018-03',text:'하수 관거시설인 빗물받이의 설치에 관한 설명으로 틀린 것은?',choices:['협잡물 및 토사의 유입을 저감할 수 있는 방안을 고려하여야 한다.','설치위치는 보ㆍ차도 구분이 없는 경우에는 도로와 사유지의 경계에 설치한다.','도로 옆의 물이 모이기 쉬운 장소나 L형 측구의 유하 방향 하단부에 설치한다.','우수침수방지를 위하여 횡단보도 및 가옥의 출입구 앞에 설치함을 원칙으로 한다.'],answer:3,explain:'횡단보도 및 가옥의 출입구 앞에는 가급적 설치하지않는것이 좋다',calc:false},
  {id:533,subject:3,exam:'2018-03',text:'상수처리를 위한 약품침전지의 구성과 구조로 틀린 것은?',choices:['슬러지의 퇴적심도로서 30cm 이상을 고려한다.','유효수심은 3~5.5m로 한다.','침전지 바닥에는 슬러지 배제에 편리하도록 배수구를 향하여 경사지게 한다.','고수위에서 침전지 벽체 상단까지의 여유고는 10cm 정도로 한다.'],answer:3,explain:'여유고는 30cm',calc:false},
  {id:534,subject:3,exam:'2018-03',text:'정수장 응집 공정에 사용되는 화학 약품 중 나머지 셋과 그 용도가 다른 하나는?',choices:['오존','명반','폴리비닐아민','황산제일철'],answer:3,explain:'오존: 살균제 나머지는 다 응집제 염소 주입농도 = 9.5+0.5=10mg/L 0.01kg/m3×200m3/hr × 24hr/day = 48kg/day',calc:false},
  {id:535,subject:3,exam:'2018-03',text:'고농도의 액상 PCB 처리방법으로 가장 거리가 먼 것은/',choices:['방사선조사(코발트 60에 의한r선 조사)','연소법','자외선조사법','고온 고압 알칼리 분해법'],answer:1,explain:'고농도 액상 PCB 처리방법: 연소법, 자외선 조사법, 고온고압 알칼리 분해법 시안을 함유한 폐수처리 -알칼리 염소처리 -오존산화',calc:false},
  {id:536,subject:3,exam:'2018-03',text:'바퀴모양의 극미동물이며, 상당히 양호한 생물학적 처리에 대한 지표미생물은?',choices:['Psychodidae','Rotifera','Vorticella','Sphaerotillus'],answer:1,explain:'고등동물 (Rotifrea, 바퀴벌레)가 발견됐다 = 생물학적 처리나 하천 자정작용이 잘 이루어졌음을 보여주 는 지표이다.',calc:false},
  {id:537,subject:3,exam:'2018-03',text:'시공계획의 수립 시 준비단계에서 고려할 사항 중 가장 거리가 먼 것은?',choices:['계약조건, 설계도, 시방서 및 공사조건을 충분히 검토한 후 시공할 작업의 범위를 결정','이용 가능한 자원을 최대로 활용할 수 있도록 현장의 각종 제약조건을 분석','계획,실시, 검토, 통제의 단계를 거쳐 작성','예정공기를 벗어나지 않는 범위내에서 가장 경제적인 시공이 될 수 있는 공법과 공정계획 수립'],answer:1,explain:'계획 - 검토 - 실시 - 통제 순 Sa=18.7mL/L, f=0.5, P=4기압, MLSS=1500mg/L 위 변수들을 아래 공식에 넣어 답을 구한다. A/S비=[{(1.3)(Sa)(f*P-1)}/MLSS] = 0.016',calc:false},
  {id:538,subject:3,exam:'2018-03',text:'혐기성 처리와 호기성 처리의 비교 설명으로 가장 거리가 먼 것은?',choices:['호기성 처리가 혐기성 처리보다 유출수의 수질이 더 좋다.','혐기성 처리가 호기성 처리보다 슬러지 발생량이 더 적다.','호기성 처리에서는 1차침전지가 필요하지만 혐기성 처리에서는 1차침전지가 필요 없다.','주어진 기질량에 대한 영양물질의 필요성은 호기성 처리보다 혐기성 처리에서 더 크다.'],answer:0,explain:'호기성 독립영양미생물, 혐기성 유입폐수의 유기물이용 [추가 해설] 호기성이 유출수 수질 및 처리속도, 양이 압도적(슬러지발생량 多) 혐기성의 경우 슬러지 발생량이 적고 호기성보다 체류시간이 김',calc:false},
  {id:539,subject:3,exam:'2018-03',text:'혐기성 공법 중 혐기성 유동상의 장점이라 볼수 없는 것은?',choices:['짧은 수기학적 체류시간과 높은 부하율로 운전이 가능하다.','유출수는 재순환이 필요 없으므로 공정이 간단하다.','매질의 첨가나 제거가 쉽다.','독성물질에 대한 완충능력이 좋다.'],answer:1,explain:'유출수의 재순환이 필요하며, 공정이 복잡하다.',calc:false},
  {id:540,subject:3,exam:'2018-03',text:'하ㆍ폐수를 통하여 배출되는 계면활성제 대한 설명 중 잘못된 것은?',choices:['계면활성제는 메틸렌블루 활성물질이라고도 한다.','계면활성제는 주로 합성세제로부터 배출되는 것이다.','물에 약간 녹으면 폐수처리 플랜트에서 거품을 만들게 된다.','ABS는 생물학적으로 분해가 매우 쉬우나 LAS는 생물학적으로 분해가 어려운 난분해성 물질이다.'],answer:3,explain:'ABS는 세척력은 우수하지만 쉽게 분해되지않음',calc:false},
  {id:541,subject:4,exam:'2018-03',text:'오존을 이용한 소독에 관한 설명으로 틀린 것은?',choices:['오존은 화학적으로 불안정하여 현장에서 직접 제조하여 사용해야 한다.','오존은 산소의 동소체로서 HOCI 보다 더 강력한 산화제이다.','오존은 20℃ 증류수에서 반감기가 20~30분 이고 용액 속에 산화제를 요구하는 물질이 존재하면 반','잔류성이 강하여 2차 오염을 방지하며 냄새제거에 매우 효과적이다.'],answer:3,explain:'잔류성이 없고, 탈취탈색효과가 크다. PH혼합 = -log((Q1N1+Q2N2)/Q1+Q2), -log((1000x10^-3 + 10000x10^-8)/1000+10000)=4.04',calc:false},
  {id:542,subject:4,exam:'2018-03',text:'알칼리성 KMnO4법으로 COD를 측정하기 위하여 사용하는 표준적정액은?',choices:['NaOH','KMnO4','Na2S2O3','Na2C2O4'],answer:3,explain:'칼리성 KMnO4법으로 COD를 측정하기 위하여 사용하는 표준적정액은? 옥살산나트륨 Na2C2O4 입니다.',calc:false},
  {id:543,subject:4,exam:'2018-03',text:'수질오염공정시험기준 상 탁도 측정에 관한 설명으로 틀린 것은?',choices:['파편과 입자가 큰 침전이 존재하는 시료를 빠르게 침전시킬 경우, 탁도값이 낮게 측정된다.','물에 색깔이 있는 시료는 잠재적으로 측정값이 높게 분석된다.','시료 속에 거품은 빛을 산란시키고 높은 측정값을 나타낸다.','탁도를 측정하기 위해서는 탁도계를 이용하여 물의 흐림 정도를 측정한다.'],answer:1,explain:'물에 색깔이 있으면 색이 빛을 흡수해서 측정값이 낮게 분석된다.',calc:false},
  {id:544,subject:4,exam:'2018-03',text:'pH 미터의 유지관리에 대한 설명으로 틀린 것은?',choices:['전극이 더러워 졌을 때는 유리전극을 묽은 염산에 잠시 담갔다가 증류수로 씻는다.','유리전극을 사용하지 않을 때는 증류수에 담가둔다.','유지, 그리스 등이 전극표면에 부착되면 유기용매로 적신 부드러운 종이로 전극을 닦고 증류수로 씻','전극에 발생하는 조류나 미생물은 전극을 보호하는 작용이므로 떨어지지 않게 주의한다.'],answer:3,explain:'전극에서 발생하는 조류와 미생물은 pH측정을 방해하므로 제거해야 한다',calc:false},
  {id:545,subject:4,exam:'2018-03',text:'분원성 대장균군-막여과법에서 배양온도 유지 기준은?',choices:['25±0.2℃','30±0.5℃','35±0.5℃','44.5±0.2℃'],answer:3,explain:'총 대장균군 35+- 0.5도 분원성대장균군 44.5+- 0.2도',calc:false},

  {id:548,subject:4,exam:'2018-03',text:'ppm을 설명한 것으로 틀린 것은?',choices:['ppb농도의 1000배 이다.','백만분율이라고 하나.','mg/kg이다.','%농도의 1/1000 이다.'],answer:0,explain:'%농도의 1/10000입니다 시료량의 0.5%를 넘지않도록 한다.',calc:true},
  {id:549,subject:4,exam:'2018-03',text:'수질오염공정시험기준에서 기체크로 마토그래피로 측정하지 않는 항목은?',choices:['유기인','음이온계면활성제','폴리클로리네이티드비페닐','알킬수은'],answer:1,explain:'기체크로마토 그래피는 일반적으로 유기화합물(알킬수은, 유기인, 석유계총탄화수소, PCB, 휘발성 유기 화합물)에 대한 정성 정량 분석에 이옹된다.',calc:false},
  {id:550,subject:4,exam:'2018-03',text:'총 질소-연속흐름법에 관한 내용으로 ( )에 옳은 것은?',choices:['수산화나트륨(0.025N)용액 칼럼','무수황산나트륨 환원 칼럼','환원증류ㆍ킬달 칼럼','카드뮴-구리환원 칼럼'],answer:2,explain:'유기물을 다량 함유하고 있으면서 산분해가 어려운 시료에 적용하는 전처리법에는 질산-과염소산 산분 해법과 마이크로파 산분해법이 있다.',calc:false},
  {id:551,subject:4,exam:'2018-03',text:'일반적으로 기체크로마토그래피의 열전도도 검출기에서 사용하는 운반기체의 종류는?',choices:['헬륨','질소','산소','이산화탄소'],answer:0,explain:'열전도도 검출기의 운반기체는 수소나 헬륨을 이용, 보기엔 수소가 없으므로 따라서 정답은 1번!',calc:false},
  {id:552,subject:4,exam:'2018-03',text:'카드뮴을 자외선/가시선 분광법으로 측정할 떄 사용되는 시약으로 가장 거리가 먼 것은?',choices:['수산화나트륨용액','요오드화칼륨용액','시안화칼륨용액','타타르산용액'],answer:1,explain:'카드뮴 UV/VIS 측정법 : 물속에 존재하는 카드뮴이온을 시안화카륨이 존재하는 알칼리성에서 디티존과 반응시켜 생성하는 카드 뮴착염을 사염화탄소로 추출하고, 추출한 카드뮴 착염을 타타르산용액으로 역추출한 다음 다시 수산화나 트륨과 시안화칼륨을 넣어 디티존과 반응하여 생성하는 적색의 카드뮴착염을 사염화탄소로 추출하고 그',calc:false},
  {id:553,subject:4,exam:'2018-03',text:'전기전도도 측정에 관한 설명으로 틀린 것은?',choices:['용액이 전류를 운반할 수 있는 정도를 말한다.','온도차에 의한 영향이 적어 폭 넓게 적용된다.','용액에 담겨있는 2개의 전극에 일정한 전압을 가해주면 가한 전압이 전류를 흐르게 하며, 이 떄 흐르','용액 중의 이온세기를 신속하게 평가할 수 있는 항목으로 국제적으로 S(Siemens)단위가 통용되고'],answer:1,explain:'2. 온도차에 의한 영향이 크다.',calc:false},
];

// ══ 상수 ══
const EXAM=new Date('2026-08-01T09:00:00+09:00');
const SN={1:'수질오염개론',2:'상하수도계획',3:'수질오염방지기술',4:'수질오염공정시험기준'};
const SC={1:'var(--accent)',2:'var(--green)',3:'var(--yellow)',4:'#e879a0'};
const LS_KEY='wqj_v5';
const LS_URL_KEY='wqj_gas_url';

// ══ 상태 ══
function ds(){return{wrongMap:{},sessions:[],totAns:0,totCor:0};}
let S=ds();
let GAS_URL='';

// ══ 초기화 ══
async function init(){
  // 1. GAS URL 로드
  GAS_URL=localStorage.getItem(LS_URL_KEY)||'';

  // 2. 기존 데이터 마이그레이션 (v3/v4 → v5)
  const migrated=tryMigrate();

  if(GAS_URL){
    // URL 있으면 드라이브에서 불러오기
    document.getElementById('setup-card').classList.add('hidden');
    document.getElementById('sync-bar').classList.remove('hidden');
    await loadFromDrive(migrated);
  } else {
    // URL 없으면 로컬 데이터 사용
    S=migrated||ds();
    renderHome();
  }
}

// ══ 마이그레이션 ══
function tryMigrate(){
  // v5 자체 로컬 데이터 우선
  const keys=['wqj_v5','wqj_v4_1','wqj_v4','wqj_v3','wq_jarvis_v3'];
  for(const k of keys){
    try{
      const raw=localStorage.getItem(k);
      if(raw){
        const p=JSON.parse(raw);
        if(p&&p.wrongMap) return p;
      }
    }catch(e){}
  }
  return null;
}

// ══ GAS URL 관리 ══
function saveGasUrl(){
  const url=document.getElementById('gas-url-input').value.trim();
  if(!url||!url.startsWith('https://')){alert('올바른 URL을 입력해주세요.');return;}
  GAS_URL=url;
  localStorage.setItem(LS_URL_KEY,url);
  document.getElementById('setup-card').classList.add('hidden');
  document.getElementById('sync-bar').classList.remove('hidden');
  // 기존 로컬 데이터 드라이브로 업로드 후 리로드
  saveToLocal();
  syncToDrive().then(()=>loadFromDrive(null));
}
function hideSetup(){
  document.getElementById('setup-card').classList.add('hidden');
  S=tryMigrate()||ds();
  setSyncBar('warn','⚠️ 로컬 저장 중 (드라이브 미연동)');
  renderHome();
}
function resetGasUrl(){
  if(!confirm('드라이브 연동을 해제하고 재설정하시겠습니까?'))return;
  GAS_URL='';
  localStorage.removeItem(LS_URL_KEY);
  document.getElementById('sync-bar').classList.add('hidden');
  document.getElementById('setup-card').classList.remove('hidden');
}

// ══ 드라이브 연동 ══
async function loadFromDrive(localFallback){
  setSyncBar('ing','⏳ 드라이브에서 불러오는 중...');
  try{
    const res=await fetch(GAS_URL+'?action=load');
    const json=await res.json();
    if(json.ok&&json.data){
      S=json.data;
      // 로컬 데이터가 더 최신이면 병합 (오답 개수 기준)
      if(localFallback){
        const localCount=Object.keys(localFallback.wrongMap||{}).length;
        const driveCount=Object.keys(S.wrongMap||{}).length;
        if(localCount>driveCount){
          S=localFallback;
          await syncToDrive();
          setSyncBar('ok','✅ 로컬→드라이브 업로드 완료');
        } else {
          setSyncBar('ok','✅ 드라이브 연동 완료');
        }
      } else {
        setSyncBar('ok','✅ 드라이브 연동 완료');
      }
    } else {
      // 드라이브에 데이터 없음 → 로컬 업로드
      S=localFallback||ds();
      await syncToDrive();
      setSyncBar('ok','✅ 드라이브 초기화 완료');
    }
  }catch(e){
    S=localFallback||ds();
    setSyncBar('err','❌ 드라이브 연결 실패 — 로컬 모드');
  }
  saveToLocal();
  renderHome();
}

async function syncToDrive(){
  if(!GAS_URL)return;
  try{
    await fetch(GAS_URL,{
      method:'POST',
      body:JSON.stringify({action:'save',data:S})
    });
  }catch(e){}
}

function saveToLocal(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){}
}

function setSyncBar(type,msg){
  const el=document.getElementById('sync-bar');
  el.className='sync-bar '+type;
  document.getElementById('sync-msg').textContent=msg;
}

// ══ 저장 (드라이브 + 로컬 동시) ══
function saveAll(){
  saveToLocal();
  syncToDrive();
}

// ══ 유틸 ══
function dday(){return Math.max(0,Math.ceil((EXAM-new Date())/(864e5)));}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function examLabel(e){if(!e)return'';const[y,m]=e.split('-');return`${y}년 ${m}월`;}

// ══ 망각곡선 ══
function getDue(){
  const t=today();
  return Object.entries(S.wrongMap)
    .filter(([,v])=>v.nextDue&&v.nextDue<=t)
    .map(([id])=>QUESTIONS.find(q=>q.id===+id)).filter(Boolean);
}
function markWrong(qid,subj){
  const ex=S.wrongMap[qid];
  const cnt=(ex?ex.count:0)+1;
  const days=[1,3,7][Math.min(cnt-1,2)];
  const nd=new Date();nd.setDate(nd.getDate()+days);
  const nextDue=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(nd.getDate()).padStart(2,'0')}`;
  S.wrongMap[qid]={count:cnt,lastWrong:today(),nextDue,subject:subj};
  saveAll();
}
function markCorrect(qid){
  if(S.wrongMap[qid]){S.wrongMap[qid].nextDue=null;saveAll();}
}

// ══ 홈 렌더 ══
function renderHome(){
  const d=dday();
  document.getElementById('hero-days').textContent=d;
  document.getElementById('dday-text').textContent='D-'+d;
  function acc(subj){
    let tot=0,cor=0;
    S.sessions.forEach(s=>{
      if(subj==='all'){tot+=s.total;cor+=s.correct;}
      else if(s.bs&&s.bs[subj]){tot+=s.bs[subj].t;cor+=s.bs[subj].c;}
    });
    return tot?Math.round(cor/tot*100):null;
  }
  const a=acc('all');
  document.getElementById('stat-all').textContent=a!==null?a+'%':'-';
  for(let i=1;i<=4;i++){
    const v=acc(i);
    document.getElementById('stat-'+i).textContent=v!==null?v+'%':'-';
    const ec=Object.values(S.wrongMap).filter(w=>w.subject===i&&w.nextDue).length;
    document.getElementById('err-'+i).textContent=ec?'오답 '+ec+'개':'';
  }
  const ea=Object.values(S.wrongMap).filter(w=>w.nextDue).length;
  document.getElementById('err-all').textContent=ea?'누적 오답 '+ea+'개':'';
  const cnt=getCfg().count;
  document.getElementById('main-start-btn').textContent=`전과목 ${cnt}문제 시작 →`;
  const due=getDue();
  const banner=document.getElementById('due-banner');
  if(due.length){banner.classList.remove('hidden');document.getElementById('due-count').textContent=due.length+'문제';}
  else banner.classList.add('hidden');
  renderReview();renderDueTab();
}

// ══ 오답노트 ══
function renderReviewList(cid,items){
  const w=document.getElementById(cid);
  if(!items.length){w.innerHTML='<div class="review-empty">문제가 없습니다.<br>퀴즈를 풀면 자동으로 쌓입니다.</div>';return;}
  const t=today();
  w.innerHTML=items.map(([id,info])=>{
    const q=QUESTIONS.find(qq=>qq.id===+id);if(!q)return'';
    const isDue=info.nextDue&&info.nextDue<=t;
    const dueTag=isDue?'<span class="tag due-tag">오늘 복습</span>':(info.nextDue?`<span class="tag">${info.nextDue} 복습 예정</span>`:'<span class="tag" style="color:var(--green)">✓ 고착</span>');
    const choicesHtml=q.choices.map((c,i)=>`<div class="r-choice ${i===q.answer?'r-correct':''}">${i+1}. ${c}</div>`).join('');
    return`<div class="review-item ${isDue?'due-item':''}">
      <div class="review-header" onclick="toggleDetail(this)">
        <div class="review-q">${q.text}</div>
        <div class="review-meta">
          <span class="tag subj-tag">${SN[q.subject]}</span>
          <span class="tag exam-tag">📅 ${examLabel(q.exam)}</span>
          <span class="tag">틀린 ${info.count}회</span>
          ${dueTag}
        </div>
      </div>
      <button class="toggle-detail" onclick="toggleDetail(this.previousElementSibling)">▼ 보기·정답 보기</button>
      <div class="review-detail">
        <div class="review-choices">${choicesHtml}</div>
        <div class="r-explain">📌 ${q.explain}</div>
      </div>
    </div>`;
  }).join('');
}
function toggleDetail(h){
  const item=h.closest('.review-item');
  const det=item.querySelector('.review-detail');
  const btn=item.querySelector('.toggle-detail');
  const open=det.classList.contains('open');
  det.classList.toggle('open');
  btn.textContent=open?'▼ 보기·정답 보기':'▲ 접기';
}
function renderReview(){renderReviewList('tab-review',Object.entries(S.wrongMap).filter(([,v])=>v.count>0));}
function renderDueTab(){
  const t=today();
  renderReviewList('tab-due',Object.entries(S.wrongMap).filter(([,v])=>v.nextDue&&v.nextDue<=t));
}
function switchTab(name){
  ['review','due','subj'].forEach(t=>document.getElementById('tab-'+t).classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['review','due','subj'][i]===name));
}

// ══ 설정 ══
function getCfg(){
  const cnt=+(document.querySelector('#cnt-group .btn-opt.active')?.dataset.val||20);
  const calc=document.querySelector('#calc-group .btn-opt.active')?.dataset.val==='include';
  const timer=document.querySelector('#timer-group .btn-opt.active')?.dataset.val==='on';
  return{count:cnt,calc,timer};
}
['cnt-group','calc-group','timer-group'].forEach(gid=>{
  document.getElementById(gid).addEventListener('click',e=>{
    if(!e.target.classList.contains('btn-opt'))return;
    e.target.closest('.btn-group').querySelectorAll('.btn-opt').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');renderHome();
  });
});

// ══ 퀴즈 ══
let QQ=[],QI=0,TI=null,TL=30,sCor=0,sTot=0,sBS={},lastMode='random';
function startQuiz(mode){
  lastMode=mode;
  const cfg=getCfg();
  let pool=[];
  if(mode==='due')pool=getDue();
  else if(mode==='random')pool=[...QUESTIONS];
  else pool=QUESTIONS.filter(q=>q.subject===mode);
  if(!cfg.calc)pool=pool.filter(q=>!q.calc);
  pool=pool.sort(()=>Math.random()-0.5);
  QQ=pool.slice(0,Math.min(cfg.count,pool.length));
  if(!QQ.length){alert('출제할 문제가 없습니다.');return;}
  QI=0;sCor=0;sTot=0;sBS={};
  document.getElementById('quiz-screen').classList.add('show');
  renderQ();
}
function renderQ(){
  const q=QQ[QI],cfg=getCfg(),total=QQ.length;
  document.getElementById('progress-fill').style.width=(QI/total*100)+'%';
  document.getElementById('q-counter').textContent=(QI+1)+'/'+total;
  document.getElementById('q-subject').textContent=SN[q.subject]||'';
  document.getElementById('q-exam').textContent=q.exam?`📅 ${examLabel(q.exam)}`:'';
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('explain-box').classList.add('hidden');
  document.getElementById('btn-next').classList.add('hidden');
  document.getElementById('q-choices').innerHTML=q.choices.map((c,i)=>`<button class="choice" onclick="pick(${i})">${i+1}. ${c}</button>`).join('');
  clearTI();
  if(cfg.timer){TL=30;setBar(30,30);TI=setInterval(()=>{TL--;setBar(TL,30);if(TL<=0){clearTI();reveal(null);}},1000);}
  else{document.getElementById('timer-fill').style.width='100%';document.getElementById('timer-fill').style.background='var(--green)';}
}
function setBar(l,t){
  const p=l/t*100,f=document.getElementById('timer-fill');
  f.style.width=p+'%';
  f.style.background=p>50?'var(--green)':p>20?'var(--yellow)':'var(--red)';
}
function clearTI(){if(TI){clearInterval(TI);TI=null;}}
function pick(idx){clearTI();reveal(idx);}
function reveal(sel){
  const q=QQ[QI];const ok=sel===q.answer;
  document.querySelectorAll('.choice').forEach((el,i)=>{
    el.disabled=true;
    if(i===q.answer)el.classList.add(sel===null?'reveal-correct':'correct');
    else if(i===sel)el.classList.add('wrong');
  });
  sTot++;
  if(!sBS[q.subject])sBS[q.subject]={t:0,c:0};
  sBS[q.subject].t++;
  if(ok){sCor++;sBS[q.subject].c++;markCorrect(q.id);}
  else markWrong(q.id,q.subject);
  document.getElementById('explain-text').textContent=q.explain;
  document.getElementById('explain-box').classList.remove('hidden');
  const nb=document.getElementById('btn-next');
  nb.classList.remove('hidden');
  nb.textContent=QI<QQ.length-1?'다음 →':'결과 보기';
}
function nextQuestion(){QI++;QI>=QQ.length?showResult():renderQ();}
function exitQuiz(){clearTI();document.getElementById('quiz-screen').classList.remove('show');renderHome();}

// ══ 결과 ══
function showResult(){
  clearTI();document.getElementById('quiz-screen').classList.remove('show');
  S.totAns+=sTot;S.totCor+=sCor;
  S.sessions.push({date:today(),total:sTot,correct:sCor,bs:sBS});
  saveAll();
  const pct=Math.round(sCor/sTot*100);
  const pe=document.getElementById('result-pct');
  pe.textContent=pct+'%';pe.className='result-pct '+(pct>=60?'pass':'fail');
  document.getElementById('result-sub').textContent=sTot+'문제 · 정답 '+sCor+'개 · 오답 '+(sTot-sCor)+'개';
  document.getElementById('result-grid').innerHTML=Object.entries(sBS).map(([s,d])=>{
    const p=Math.round(d.c/d.t*100);
    return`<div class="result-card">
      <div class="result-card-label" style="color:${SC[s]}">${SN[s]}</div>
      <div class="result-card-val" style="color:${p>=60?'var(--green)':'var(--red)'}">${p}%</div>
      <div style="font-size:10px;color:var(--sub);margin-top:2px">${d.c}/${d.t}</div>
    </div>`;
  }).join('');
  document.getElementById('result-screen').classList.add('show');
  renderHome();
}
function retryQuiz(){document.getElementById('result-screen').classList.remove('show');startQuiz(lastMode);}
function goHome(){document.getElementById('result-screen').classList.remove('show');renderHome();}

// ══ 시작 ══
init();
</script>
</body>
</html>
