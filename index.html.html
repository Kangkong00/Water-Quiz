<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WaterQuiz JARVIS v5</title>
<style>
:root{
  --bg:#0d1117;--card:#161b22;--card2:#1c2230;--border:#2a3441;
  --accent:#4f8ef7;--accent2:#7c5cbf;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--text:#e6edf3;--sub:#8b949e;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh}
.header{padding:18px 18px 0;display:flex;justify-content:space-between;align-items:center}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--sub)}
.d-day{font-size:13px;color:var(--accent);font-weight:700}
.hero{padding:14px 18px 16px}
.hero h1{font-size:36px;font-weight:800;letter-spacing:-1px}
.hero h1 span{color:var(--accent)}
.hero p{color:var(--sub);font-size:12px;margin-top:3px}

/* 연동 설정 카드 */
.setup-card{margin:0 18px 12px;background:var(--card);border:1px solid var(--accent);border-radius:var(--r);padding:16px}
.setup-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px}
.setup-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;padding:10px;margin-bottom:8px}
.setup-btns{display:flex;gap:8px}
.setup-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer}
.setup-btn.primary{background:var(--accent);color:#fff}
.setup-btn.secondary{background:var(--card2);color:var(--sub)}
.setup-tip{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.6}

/* 동기화 상태 */
.sync-bar{margin:0 18px 10px;padding:8px 12px;border-radius:8px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.sync-bar.ok{background:rgba(63,185,80,0.1);border:1px solid rgba(63,185,80,0.3);color:var(--green)}
.sync-bar.err{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);color:var(--red)}
.sync-bar.ing{background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.3);color:var(--accent)}
.sync-bar.warn{background:rgba(210,153,34,0.1);border:1px solid rgba(210,153,34,0.3);color:var(--yellow)}
.sync-reset{font-size:11px;color:var(--sub);cursor:pointer;text-decoration:underline;white-space:nowrap}

.due-banner{margin:0 18px 10px;background:rgba(210,153,34,0.1);border:1px solid rgba(210,153,34,0.3);border-radius:var(--r);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.due-banner-text{font-size:13px;color:var(--yellow)}
.due-banner-count{font-size:18px;font-weight:800;color:var(--yellow)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 18px 14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-card.full{grid-column:1/-1;border-color:var(--accent)}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stat-pct{font-size:26px;font-weight:800}
.stat-err{font-size:11px;color:var(--red);margin-top:1px}
.pct-blue{color:var(--accent)}.pct-green{color:var(--green)}.pct-orange{color:var(--yellow)}.pct-pink{color:#e879a0}
.config{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin:0 18px 14px;padding:16px}
.config-row{margin-bottom:12px}.config-row:last-child{margin-bottom:0}
.config-label{font-size:11px;color:var(--sub);margin-bottom:7px}
.btn-group{display:flex;gap:6px}
.btn-opt{flex:1;padding:9px 0;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--sub);font-size:13px;cursor:pointer}
.btn-opt.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.start-wrap{padding:0 18px 14px}
.btn-start{width:100%;padding:16px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.btn-start:active{opacity:0.85;transform:scale(0.98)}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 18px}
.tab{flex:1;padding:12px 0;text-align:center;font-size:13px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.review-wrap{padding:14px 18px}
.review-empty{text-align:center;padding:50px 0;color:var(--sub);font-size:14px}
.review-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.review-item.due-item{border-color:var(--yellow)}
.review-header{padding:14px 14px 0;cursor:pointer}
.review-q{font-size:14px;line-height:1.5;margin-bottom:8px;font-weight:500}
.review-meta{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:10px}
.tag{font-size:11px;padding:3px 7px;border-radius:6px;background:var(--card2);color:var(--sub)}
.tag.due-tag{background:rgba(210,153,34,0.15);color:var(--yellow)}
.tag.subj-tag{background:rgba(79,142,247,0.12);color:var(--accent)}
.tag.exam-tag{background:rgba(63,185,80,0.1);color:var(--green)}
.review-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.review-detail.open{display:block}
.review-choices{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.r-choice{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);font-size:13px;line-height:1.4;color:var(--sub)}
.r-choice.r-correct{border-color:var(--green);background:rgba(63,185,80,0.1);color:var(--green);font-weight:600}
.r-explain{margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--sub);line-height:1.6}
.toggle-detail{width:100%;padding:8px;border:none;background:none;color:var(--sub);font-size:12px;cursor:pointer;border-top:1px solid var(--border)}
.quiz-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto}
.quiz-screen.show{display:block}
.quiz-header{padding:18px 18px 10px;display:flex;align-items:center;gap:12px}
.btn-back{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:13px;cursor:pointer}
.progress-bar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s}
.q-counter{font-size:12px;color:var(--sub);white-space:nowrap}
.timer-bar{height:3px;background:var(--border);margin:0 18px 14px;border-radius:2px;overflow:hidden}
.timer-fill{height:100%;background:var(--green);border-radius:2px;transition:width 1s linear,background 0.3s}
.q-body{padding:0 18px}
.q-subject{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px}
.q-exam{font-size:11px;color:var(--green);margin-bottom:8px}
.q-text{font-size:15px;line-height:1.65;font-weight:600;margin-bottom:18px}
.q-choices{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.choice{padding:13px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);font-size:14px;line-height:1.4;cursor:pointer;text-align:left;color:var(--text);width:100%}
.choice.correct{border-color:var(--green);background:rgba(63,185,80,0.12);color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(248,81,73,0.12);color:var(--red)}
.choice.reveal-correct{border-color:var(--green);background:rgba(63,185,80,0.08)}
.explain-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.explain-title{font-size:11px;color:var(--sub);margin-bottom:6px}
.explain-text{font-size:13px;line-height:1.6}
.btn-next{width:calc(100% - 36px);margin:0 18px 28px;padding:15px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.result-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto}
.result-screen.show{display:block}
.result-inner{padding:36px 18px}
.result-pct{font-size:68px;font-weight:900;letter-spacing:-3px;text-align:center}
.result-pct.pass{color:var(--green)}.result-pct.fail{color:var(--red)}
.result-sub{color:var(--sub);font-size:13px;margin-top:4px;text-align:center;margin-bottom:28px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.result-card-label{font-size:10px;color:var(--sub);margin-bottom:3px}
.result-card-val{font-size:20px;font-weight:800}
.btn-home{width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--card2);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-retry{width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px}
.subj-wrap{display:flex;flex-direction:column;gap:8px;padding:14px 18px}
.hidden{display:none}
</style>
</head>
<body>
<div id="home">
  <div class="header">
    <div class="badge">JARVIS · 수질환경기사</div>
    <div class="d-day" id="dday-text">D-?</div>
  </div>
  <div class="hero">
    <h1>시험까지 <span id="hero-days">?</span>일</h1>
    <p>2026.08.01 필기 합격 목표</p>
  </div>

  <!-- Google Apps Script URL 설정 -->
  <div class="setup-card" id="setup-card">
    <div class="setup-title">🔗 구글 드라이브 연동 설정</div>
    <input class="setup-input" id="gas-url-input" type="url" placeholder="Google Apps Script 배포 URL 붙여넣기">
    <div class="setup-btns">
      <button class="setup-btn primary" onclick="saveGasUrl()">연동 저장</button>
      <button class="setup-btn secondary" onclick="hideSetup()">나중에</button>
    </div>
    <div class="setup-tip">
      아직 설정 전이라면 → <b>나중에</b>를 누르고 지금 바로 퀴즈를 시작하세요.<br>
      데이터는 이 기기에 임시 저장되다가 연동 후 자동으로 드라이브에 업로드됩니다.
    </div>
  </div>

  <div class="sync-bar ing hidden" id="sync-bar">
    <span id="sync-msg">⏳ 동기화 중...</span>
    <span class="sync-reset" onclick="resetGasUrl()">연동 재설정</span>
  </div>

  <div class="due-banner hidden" id="due-banner" onclick="startQuiz('due')">
    <div class="due-banner-text">🔁 오늘 망각곡선 복습 문제</div>
    <div class="due-banner-count" id="due-count">0문제</div>
  </div>
  <div class="stats">
    <div class="stat-card full">
      <div class="stat-label"><span class="dot" style="background:var(--accent)"></span>전과목 누적 정확도</div>
      <div class="stat-pct pct-blue" id="stat-all">-</div>
      <div class="stat-err" id="err-all"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="dot" style="background:var(--accent)"></span>수질오염개론</div>
      <div class="stat-pct pct-blue" id="stat-1">-</div>
      <div class="stat-err" id="err-1"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="dot" style="background:var(--green)"></span>상하수도계획</div>
      <div class="stat-pct pct-green" id="stat-2">-</div>
      <div class="stat-err" id="err-2"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="dot" style="background:var(--yellow)"></span>수질오염방지기술</div>
      <div class="stat-pct pct-orange" id="stat-3">-</div>
      <div class="stat-err" id="err-3"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label"><span class="dot" style="background:#e879a0"></span>수질오염공정시험기준</div>
      <div class="stat-pct pct-pink" id="stat-4">-</div>
      <div class="stat-err" id="err-4"></div>
    </div>
  </div>
  <div class="config">
    <div class="config-row">
      <div class="config-label">문제 수</div>
      <div class="btn-group" id="cnt-group">
        <button class="btn-opt" data-val="10">10</button>
        <button class="btn-opt active" data-val="20">20</button>
        <button class="btn-opt" data-val="30">30</button>
        <button class="btn-opt" data-val="40">40</button>
      </div>
    </div>
    <div class="config-row">
      <div class="config-label">계산문제</div>
      <div class="btn-group" id="calc-group">
        <button class="btn-opt active" data-val="skip">스킵</button>
        <button class="btn-opt" data-val="include">포함</button>
      </div>
    </div>
    <div class="config-row">
      <div class="config-label">30초 타이머</div>
      <div class="btn-group" id="timer-group">
        <button class="btn-opt active" data-val="on">ON</button>
        <button class="btn-opt" data-val="off">OFF</button>
      </div>
    </div>
  </div>
  <div class="start-wrap">
    <button class="btn-start" id="main-start-btn" onclick="startQuiz('random')">전과목 20문제 시작 →</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('review')">오답노트</div>
    <div class="tab" onclick="switchTab('due')">오늘 복습</div>
    <div class="tab" onclick="switchTab('subj')">과목별</div>
  </div>
  <div id="tab-review" class="review-wrap"></div>
  <div id="tab-due" class="review-wrap hidden"></div>
  <div id="tab-subj" class="hidden">
    <div class="subj-wrap">
      <button class="btn-start" style="background:linear-gradient(135deg,var(--accent),#2563eb)" onclick="startQuiz(1)">1과목 수질오염개론</button>
      <button class="btn-start" style="background:linear-gradient(135deg,var(--green),#166534)" onclick="startQuiz(2)">2과목 상하수도계획</button>
      <button class="btn-start" style="background:linear-gradient(135deg,var(--yellow),#92400e)" onclick="startQuiz(3)">3과목 수질오염방지기술</button>
      <button class="btn-start" style="background:linear-gradient(135deg,#e879a0,#9f1239)" onclick="startQuiz(4)">4과목 수질오염공정시험기준</button>
      <button class="btn-start" style="background:linear-gradient(135deg,var(--accent2),#581c87)" onclick="startQuiz('due')">🔁 망각곡선 복습만</button>
    </div>
  </div>
</div>

<div id="quiz-screen" class="quiz-screen">
  <div class="quiz-header">
    <button class="btn-back" onclick="exitQuiz()">← 나가기</button>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="q-counter" id="q-counter">1/20</div>
  </div>
  <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
  <div class="q-body">
    <div class="q-subject" id="q-subject"></div>
    <div class="q-exam" id="q-exam"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-choices" id="q-choices"></div>
    <div class="explain-box hidden" id="explain-box">
      <div class="explain-title">📌 해설</div>
      <div class="explain-text" id="explain-text"></div>
    </div>
  </div>
  <button class="btn-next hidden" id="btn-next" onclick="nextQuestion()">다음 →</button>
</div>

<div id="result-screen" class="result-screen">
  <div class="result-inner">
    <div class="result-pct" id="result-pct"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-grid" id="result-grid"></div>
    <button class="btn-retry" onclick="retryQuiz()">같은 조건으로 다시</button>
    <button class="btn-home" onclick="goHome()">홈으로</button>
  </div>
</div>

<script>
const QUESTIONS = [
  {id:1,subject:1,exam:'2022-04',text:'강우의 pH의 관한 설명으로 틀린 것은?',choices:['보통 대기중의 이산화탄소와 평형상태에 있는 물은 약 pH 5.7의 산성을 띠고 있다.','산성강우의 주요원인 물질로 황산화물, 질소산화물 및 염소산화물을 들 수 있다.','산성강우현상은 대기오염이 혹심한 지역에 국한되어 나타난다.','강우는 부유재(ﬂy ash)로 인하여 때때로 알칼리성을 띨 수 있다.'],answer:2,explain:'산성비는 넓은 지역으로 발생해 광범위한 피해를 입힌다',calc:false},
  {id:2,subject:1,exam:'2022-04',text:'호소의 부영양화에 대한 일반적 영향으로 틀린 것은?',choices:['부영양화가 진행된 수원을 농업용수로 사용하면 영양염류의 공급으로 농산물 수확량이 지속적으로','조류나 미생물에 의해 생성된 용해성 유기물질이 불쾌한 맛과 냄새를 유발한다.','부영양화 평가모델은 인(P)부하모델인 Vollenweider 모델 등이 대표적이다.','심수층의 용존산소량이 감소한다.'],answer:0,explain:'부영양화 호수나 해역에 유기물이 유입되어 분해되면 질소와 인 등의 영양염류가 증가되어 조류가 과다하게 번식한 다. 과다하게 번식한 조류가 수중 산소를 고갈시키고 수질을 악화시키는데 이것을 부영양화라고 한다.',calc:false},
  {id:3,subject:1,exam:'2022-04',text:'수질오염물질 중 중금속에 관한 설명으로 틀린 것은?',choices:['카드뮴 : 인체 내에서 투과성이 높고 이동성이 있는 독성 메틸 유도체로 전환된다.','비소 : 인산염 광물에 존재해서 인 화합물 형태로 환경 중에 유입된다.','납 : 급성독성은 신장, 생식계통, 간 그리고 뇌와 중추신경계에 심각한 장애를 유발한다.','수은 : 수은 중독은 BAL, Ca2EDTA로 치료할 수 있다.'],answer:0,explain:'카드뮴은 투과성이 낮아 체내에 쌓이고 이따이이따이병을 앓게 된다',calc:false},
  {id:4,subject:1,exam:'2022-04',text:'광합성에 대한 설명으로 틀린 것은?',choices:['호기성광합성(녹색식물의 광합성)은 진조류와 청녹조류를 위시하여 고등식물에서 발견된다.','녹색식물의 광합성은 탄산가스와 물로부터 산소와 포도당(또는 포도당 유도산물)을 생성하는 것이','세균활동에 의한 광합성은 탄산가스의 산화를 위하여 물 이외의 화합물질이 수소원자를 공여, 유리','녹색식물의 광합성 시 광은 에너지를 그리고 물은 환원반응에 수소를 공급해 준다.'],answer:2,explain:'3. 탄산가스의 환원',calc:false},
  {id:5,subject:1,exam:'2022-04',text:'물의 특성에 대한 설명으로 옳지 않은 것은?',choices:['기화열이 크기 때문에 생물의 효과적인 체온 조절이 가능하다.','비열이 크기 때문에 수온의 급격한 변화를 방지해 줌으로써 생물활동이 가능한 기온을 유지한다.','융해열이 작기 때문에 생물체의 결빙이 쉽게 일어나지 않는다.','빙점과 비점사이가 100℃나 되므로 넓은 범위에서 액체 상태를 유지할 수 있다.'],answer:2,explain:'융해열 물은 융해열이 크다. 융해열이란 고체에서 액체로 변화하기 위해 필요한 에너지를 말한다. 물의 융해열이 크다는 것은 0도의 얼음에서 0도의 물로 변하기 위해 필요한 에너지가 많이 필요하다는 것',calc:false},
  {id:6,subject:1,exam:'2022-04',text:'생물농축에 대한 설명으로 가장 거리가 먼 것은?',choices:['수생생물체내의 각종 중금속 농도는 환경수중의 농도보다는 높은 경우가 많다.','생물체중의 농도와 환경수중의 농도비를 농축비 또는 농축계수라고 한다.','수생생물의 종류에 따라서 중금속의 농축비가 다른 경우가 많다.','농축비는 먹이사슬 과정에서 높은 단계의 소비자에 상당하는 생물일수록 낮게 된다.'],answer:2,explain:'생물농축 농축비는 높은 사슬의 생물일수록 높다. 예) 플랑크톤 1마리가 중금속을 1 축적하고 있다고 가정 멸치가 플랑크톤 1000마리를 먹는다 -> 중금속이 멸치 내에 1000 축적',calc:false},
  {id:7,subject:1,exam:'2022-04',text:'부영양화가 진행된 호소에 대한 수면관리 대책으로 틀린 것은?',choices:['수증폭기한다.','퇴적층을 준설한다.','수생식물을 이용한다.','살조제는 황산알루미늄을 주로 많이 쓴다.'],answer:3,explain:'살조제 조류를 죽이는 성분을 지닌 물질 황산구리, 황산동, 과산화수소, 염소, 오존',calc:false},
  {id:8,subject:1,exam:'2022-04',text:'생물학적 질화 중 아질산화에 관한 설명으로 틀린 것은?',choices:['Nitrobacter에 의해 수행된다.','수율은 0.04~0.13mg VSS/mg NH4+ -N정도이다.','관련 미생물은 독립영양성 세균이다.','산소가 필요하다.'],answer:0,explain:'아질산화 관여 미생물 : Nitrosomonas 질산화 관여 미생물 : Nitrobacter',calc:false},
  {id:9,subject:1,exam:'2022-04',text:'0.01 M-KBr과 0.02 M-ZnSO4 용액의 이온강도는? (단, 완전 해리 기준)',choices:['0.08','0.09','0.12','0.14'],answer:1,explain:'이온강도 1가 이온 : 0.5 x 농도 2가 이온 : 2 x 농도 3가 이온 : 4.5 x 농도',calc:false},
  {id:10,subject:1,exam:'2022-04',text:'반응속도에 관한 설명으로 알맞지 않은 것은?',choices:['영차반응 : 반응물의 농도에 독립적인 속도로 진행하는 반응이다.','일차반응 : 반응속도가 시간에 따른 반응물의 농도변화 정도에 반비례하여 진행하는 반응이다.','이차반응 : 반응속도가 한가지 반응물 농도의 제곱에 비례하여 진행하는 반응이다.','실험치에 따라 특정 반응속도의 차수를 구하기 위하여는 시간에 따른 농도변화를 그래프로 그리고'],answer:1,explain:'농도변화 정도에 비례 어떤 물질이 1/n로 감소하는데 걸리는 시간 계산 Ct/Co=e^(-kt) *Ct = t시간 후 남은 양',calc:false},
  {id:11,subject:1,exam:'2022-04',text:'수질모델링을 위한 절차에 해당하는 항목으로 가장 거리가 먼 것은?',choices:['변수추정','수질예측 및 평가','보정','감응도 분석'],answer:1,explain:'1. 모델의 설계 및 자료수집 - 대상수계의 지역특성,형상, 수문학적 요소등을 고려하여 모델을 설계하고 현지 조사 및 문헌조사등을 통하여 입력자료 수집 2. 모델링의 선정 및 예비적용',calc:false},
  {id:12,subject:2,exam:'2022-04',text:'다음의 기체 법칙 중 옳은 것은?',choices:['Boyle의 법칙 : 일정한 압력에서 기체의 부피는 절대온도에 정비례한다.','Henry의 법칙 : 기체와 관련된 화학반응에서는 반응하는 기체와 생성되는 기체의 부피 사이에 정수','Graham의 법칙 : 기체의 확산속도(조그마한 구멍을 통한 기체의 탈출)는 기체 분자량의 제곱근에','Gay-Lussac의 결합 부피 법칙 : 혼합 기체내의 각 기체의 부분압력은 혼합물 속의 기체의 양에 비'],answer:3,explain:'1  보일의 법칙 : 일정 온도에서 일정 질량의 기체가 가지는 압력과 부피의 곱은 일정하다. 2. 헨리의 법칙 : 난용성기체에만 적용되며, 일정한 온도에서 용매에 녹는 기체의 질량은 압력에 비례한 다. 4. 게이-루삭의 법칙 : 화학반응에서의 기체의 부피는 간단한 정수비를 나타낸다.',calc:false},
  {id:13,subject:2,exam:'2022-04',text:'계획 오수량에 관한 설명으로 ()에 알맞은 내용은?',choices:['원칙적으로 계획 1일 최대 오수량의 2배','원칙적으로 계획 1일 최대 오수량의 3배','원칙적으로 계획시간 최대 오수량의 2배','원칙적으로 계획시간 최대 오수량의 3배'],answer:3,explain:'*참고 계획1일 최대오수량 : (1인1실 최대오수량*계획인구)+기타배수량 계획1일 평균오수량 : 계획1일 최대오수량의 70~80%를 표준으로 한다. 계획시간 최대오수량 : 계획1일 최대오수량의 1시간당 수량의 1.3~1.8배를 표준으로 한다.',calc:false},
  {id:14,subject:2,exam:'2022-04',text:'하수 배제방식의 특징에 대한 설명으로 옳지 않은 것은?',choices:['분류식은 우천 시에 월류가 없다.','분류식은 강우초기 노면 세정수가 하천 등으로 유입되지 않는다.','합류식 시설의 일부를 개선 또는 개량하면 강우초기의 오염된 우수를 수용해서 처리할 수 있다.','합류식은 우천 시 일정량 이상이 되면 오수가 월류한다.'],answer:1,explain:'[하수 배제방식] 1) 분류식 : 일반 가정의 생활하수(오수)와 빗물(우수)을 각각 다른 하수관으로 흘러가게 함 - 우천시 월류가 없음 - 강우 초기의 오염된 우수 및 노면 오염물질이 처리되지 못하고 공공수역으로 방류',calc:false},
  {id:15,subject:2,exam:'2022-04',text:'정수처리방법인 중간염소처리에서 염소의 주입 지점으로 가장 적절한 것은?',choices:['혼화지와 침전지 사이','침전지와 여과지 사이','착수정과 혼화지 사이','착수정과 도수관 사이'],answer:2,explain:'중간염소처리 : 원수 중에 부식질 등의 유기물이 존재하면 유리잔류염소와 반응하여 트리할로메탄이 생성 되므로 이러한 우려가 높을 경우에는 응집, 침전으로 부식질을 어느정도 제거한 후 염소처리를 하는 것. 침 전지와 여과지 사이에 염소를 주입한다.',calc:false},
  {id:16,subject:2,exam:'2022-04',text:'하수관로에 관한 설명 중 옳지 않은 것은?',choices:['우수관로에서 계획하수량은 계획우수량으로 한다.','합류식 관로에서 계획하수량은 계획시간 최대오수량에 계획우수량을 합한 것으로 한다.','차집관로에서 계획하수량은 계획시간 최대 오수량으로 한다.','지역의 실정에 따라 계획하수량에 여유율을 둘 수 있다.'],answer:2,explain:'차집관거 계획하수량 : 우천시 계획하수량',calc:false},
  {id:17,subject:2,exam:'2022-04',text:'기존의 하수처리시설에 고도처리시설을 설치하고자 할 때 검토사항으로 틀린 것은?',choices:['표준활성슬러지법이 설치된 기존처리장의 고도처리 개량은 개선대상 오염물질별 처리특성을 감안하','시설개량은 시설개량방식을 우선 검토하되 방류수 수질기준 준수가 곤란한 경우에 한해 운전개선방','기본설계과정에서 처리장의 운영실태 정밀분석을 실시한 후 이를 근거로 사업추진방향 및 범위 등을','기존시설물 및 처리공정을 최대한 활용하여야 한다.'],answer:1,explain:'운전개선방식을 먼저 추진하고 그 다음에 시설개량방식을 추진',calc:false},
  {id:18,subject:2,exam:'2022-04',text:'해수담수화방식 중 상(相)변화방식인 증발법에 해당되는 것은?',choices:['가스수화물법','다중효용법','냉동법','전기투석법'],answer:1,explain:'나머지는 상불변(相不變)방식입니다. 비교회전도 = (N(rpm)*Q^(1/2))/H^(3/4) Q 단위 : m^3/min 흡입구경D(mm) = 146*(토출량Q(m^3/min)/유속V(m/s))^0.5',calc:false},
  {id:19,subject:2,exam:'2022-04',text:'막모듈의 열화와 가장 거리가 먼 것은?',choices:['장기적인 압력부하에 의한 막 구조의 압밀화','건조되거나 수축으로 인한 막 구조의 비가역적인 변화','원수 중의 고형물이나 진동에 의한 막 면의 상처, 마모, 파단','막의 다공질부의 흡착, 석출, 포착 등에 의한 폐색'],answer:3,explain:'파울링: 일시적(가역적)인 변화 열화: 영구적(비가역적)인 변화 4번은 파울링',calc:false},
  {id:20,subject:2,exam:'2022-04',text:'상수도 계획급수량과 관련된 내용으로 잘못된 것은?',choices:['계획1일평균급수량=계획1일평균사용수량/계획유효율','계획1일최대급수량=계획1일평균급수량×계획첨두율','일반적인 산청절차는 각 용도별 1일평균사용수량(실적)→각 계획용도별 1일평균 사용수량→계획 1','일반적으로 소규모 도시일수록 첨두율 값이 작다.'],answer:0,explain:'* 첨두율 : 평균급수량에 대한 최대급수량의 크기를 나타내는 것 소규모의 도시 일수록 값이 커짐 압력식(다중압송) 장점) 지형변화에 대응 용이, 공사점용면적 최소화 가능, 공사기간 및 민원의 최소화, 최소유속 확보',calc:false},
  {id:21,subject:2,exam:'2022-04',text:'도수거에 관한 설명으로 옳지 않은 것은?',choices:['수리학적으로 자유 수면을 갖고 중력 작용으로 경사진 수로를 흐르는 시설이다.','개거나 암거인 경우에는 대개 300~500m 간격으로 시공조인트를 겸한 신축조인트를 설치한다.','균일한 동수경사(통상 1/3000~1/1000)로 도수하는 시설이다.','도수거의 평균유속의 최대한도는 3.0m/sec로 하고 최소유속은 0.3m/sec로 한다.'],answer:1,explain:'개거나 암거인 경우 대개 30~50m 간격으로 시공조인트를 겸한 신축조인트를 설치',calc:false},
  {id:22,subject:2,exam:'2022-04',text:'하수처리를 위한 산화구법에 관한 설명으로 틀린 것은?',choices:['용량은 HRT가 24~48시간이 되도록 정한다.','형상은 장원형무한수로로 하며 수심은 1.0~3.0m, 수로 폭은 2.0~6.0m 정도가 되도록 한다.','저부하조건의 운전으로 SRT가 길어 질산화반응이 진행되기 때문에 무산소조건을 적절히 만들면 7','산화구내의 혼합상태가 균일하여도 구내에서 MLSS, 알칼리도 농도의 구배는 크다.'],answer:3,explain:'산화구 내의 혼합상태에 따른 용존산소농도는 흐름의 방향에 따라 지배를 받을 수 있지만 MLSS농도, 알 칼리도 등은 구내에서 균일하다.',calc:false},
  {id:23,subject:2,exam:'2022-04',text:'취수시설에서 침사지에 관한 설명으로 옳지 않은 것은?',choices:['지의 위치는 가능한 한 취수구에 근접하여 제내지에 설치한다.','지의 상단높이는 고수위보다 0.3~0.6m의 여유고를 둔다.','지의 고수위는 계획취수량이 유입될 수 있도록 취수구의 계획최저수위 이하로 정한다.','지의 길이는 폭의 3~8배, 지내 평균 유속 2~7cm/sec를 표준으로 한다.'],answer:1,explain:'침사지의 상단높이는 고수위보다 0.6~1m의 여유고를 둠',calc:false},
  {id:24,subject:2,exam:'2022-04',text:'상수의 공급과정을 바르게 나타낸 것은?',choices:['취수→도수→정수→송수→배수→급수','취수→도수→송수→정수→배수→급수','취수→송수→정수→배수→도수→급수','취수→송수→배수→정수→도수→급수'],answer:0,explain:'Q=AV 10=X*0.4 X=25 25=5^2',calc:false},
  {id:25,subject:2,exam:'2022-04',text:'정수시설 중 플록형성지에 관한 설명으로 틀린 것은?',choices:['기계식교반에서 플록큐레이터(ﬂocculator)의 주변속도는 5~10cm/sec를 표준으로 한다.','플록형성시간은 계획정수량에 대하여 20~40분간을 표준으로 한다.','직사각형이 표준이다.','혼화지와 침전지 사이에 위치하고 침전지에 붙여서 설치한다.'],answer:0,explain:'기계식 교반에서 플로큐레이션의 주변속도는 15~80cm/s를 표준으로 함.',calc:false},
  {id:26,subject:3,exam:'2022-04',text:'오수관거 계획 시 기준이 되는 오수량은?',choices:['계획시간최대오수량','계획1일최대오수량','계획시간평균오수량','계획1일평균오수량'],answer:0,explain:'오수관로: 계획시간 최대오수량 우수관로: 계획우수량 합류식 관로: 계획시간 최대오수량+ 계획우수량 차집관로: 우천시 계획하수량',calc:false},
  {id:27,subject:3,exam:'2022-04',text:'탈질소 공정에서 폐수에 탄소원 공급용으로 가해지는 약품은?',choices:['응집제','질산','소석회','메탄올'],answer:0,explain:'메탄올을 탄소원으로 이용하는 탈질소 공정의 반응식 6NO3- + 5CH3OH > 6OH- + 3N2 + 5CO2 + 7H2O Air/Solid 비 [((1.3 x 공기용해량) x ((f x 유효전달압력) - 1 )) / MLSS 농도]',calc:false},
  {id:28,subject:3,exam:'2022-04',text:'경사판 침전지에서 경사판의 효과가 아닌 것은?',choices:['수면적 부하율의 증가효과','침전지 소요면적의 저감효과','고형물의 침전효율 증대효과','처리효율의 증대효과'],answer:2,explain:'경사판의 효과 - 수면적이 커져 수면적 부하율이 줄어들어 침전지 소요 면적이 줄어든다 - 고형물의 침전효율이 증대되어 처리수가 청정화 된다 하수처리장 운영비의 가장 큰 부분을 차지하는 것이 전력요금이며, 전력요금의 대부분은 포기를 위한 송',calc:false},
  {id:29,subject:3,exam:'2022-04',text:'Side Stream을 적용하여 생물학적 방법과 화학적 방법으로 인을 제거하는 공정은?',choices:['수정 Bardenpho 공정','Phostrip 공정','SBR 공정','UCT 공정'],answer:1,explain:'문제 Side stream (측류)에서 인제거하는 방법 Phostrip공정 main stream에서 인 제거하는 방법 A/O 공법',calc:false},
  {id:30,subject:3,exam:'2022-04',text:'이온교환막 전기투석법에 관한 설명 중 옳지 않은 것은?',choices:['칼슘, 마그네슘 등 경도 물질의 제거효율은 높지만 인 제거율은 상대적으로 낮다.','콜로이드성 현탁물질 제거에 주로 적용된다.','배수 중의 용존염분을 제거하여 양질의 처리수를 얻는다.','소요전력은 용존염분농도에 비례하여 증가한다.'],answer:1,explain:'전기투석법은 막공법으로, 콜로이드성 물질은 응집침전법으로 처리함',calc:false},
  {id:31,subject:3,exam:'2022-04',text:'분리막을 이용한 수처리 방법 중 추진력이 정수압차가 아닌 것은?',choices:['투석','정밀여과','역삼투','한외여과'],answer:2,explain:'투석 : 농도차 제 1형 침전: 독립침전, 자유침전 스토크 법칙을 따름 제 2형 침전: 플록침전, 응결침전, 응집침전 입자들이 서로 위치를 바꾸려 함 제 3형 침전: 지역침전, 계면침전, 방해침전 입자들이 서로 위치를 바꾸려 하지 않음',calc:false},
  {id:32,subject:3,exam:'2022-04',text:'회전원판법(RBC)의 장점으로 가장 거리가 먼 것은?',choices:['미생물에 대한 산소 공급 소요전력이 적다.','고정메디아로 높은 미생물 농도 및 슬러지일령을 유지할 수 있다.','기온에 따른 처리효율의 영향이 적다.','재순환이 필요 없다.'],answer:2,explain:'기온에 따른 처리효율의 영향이 크다.',calc:false},
  {id:33,subject:3,exam:'2022-04',text:'상향류 혐기성 슬러지상의 장점이라 볼 수 없는 것은?',choices:['미생물 체류시간을 적절히 조절하면 저농도 유기성 폐수의 처리도 가능하다.','기계적인 교반이나 여재가 필요 없기 때문에 비용이 적게 든다.','고액 및 기액분리장치를 제외하면 전체적으로 구조가 간단하다.','폐수 성상이 슬러지 입상화에 미치는 영향이 적어 안정된 처리가 가능하다.'],answer:3,explain:'상향류 혐기성 슬러지 상(UASB) 는 폐수의 성상에 의하여 슬러지의 입상화가 "크게" 영향을 받는다.',calc:false},
  {id:34,subject:3,exam:'2022-04',text:'하수 고도처리 공법인 Phostrip 공정에 관한 설명으로 옳지 않은 것은?',choices:['기존 활성슬러지 처리장에 쉽게 적용 가능하다.','인제거 시 BOD/P비에 의하여 조절되지 않는다.','최종침전지에서 인용출을 위해 용존산소를 낮춘다.','Mainstream 화학침전에 비하여 약품사용량이 적다.'],answer:2,explain:'최종침전지에서 인용출 방지를 위해 용존산소를 높게 유지한다.',calc:false},
  {id:35,subject:4,exam:'2022-04',text:'생물학적 처리법 가운데 살수여상법에 대한 설명으로 가장 거리가 먼 것은?',choices:['슬러지일령은 부유성장 시스템보다 높아 100일 이상의 슬러지일령에 쉽게 도달된다.','총괄 관측수율은 전형적인 활성슬러지공정의 60~80% 정도이다.','덮개 없는 여상의 재순환율을 증대시키면 실제로 여상 내의 평균온도가 높아진다.','정기적으로 여상에 살충제를 살포하거나 여상을 침수토록 하여 파리문제를 해결할 수 있다.'],answer:2,explain:'여상의 재순환율을 증가시키면 여상 내의 평균온도는 하강한다. 표면부하율 : 침전지에서 단위 면적당 처리하는 유량 표면부하율 = 처리유량/침전지 표면적 침전지 표면적 = 처리유량 / 표면부하율 = 10000 [m^3/day] / 50 [m^3/m^2*day] = 200m^2',calc:false},
  {id:36,subject:4,exam:'2022-04',text:'시료의 보존방법으로 틀린 것은?',choices:['아질산성 질소 : 4℃ 보관, H2SO4로 pH2 이하','총질소(용존 총질소) : 4℃ 보관, H2SO4로 pH 2 이하','화학적 산소요구량 : 4℃ 보관, H2SO4로 pH 2이하','암모니아성 질소 : 4℃ 보관, H2SO4로 pH 2 이하'],answer:0,explain:'아질산성 질소 4도 보관 최대보존기간 48시간 권장보존기간 즉시',calc:false},
  {id:37,subject:4,exam:'2022-04',text:'원자흡수분광광도법에서 일어나는 간섭에 대한 설명으로 틀린 것은?',choices:['광학적 간섭 : 분석하고자 하는 원소의 흡수 파장과 비슷한 다른 원소의 파장이 서로 겹쳐 비이상적','물리적 간섭 : 표준용액과 시료 또는 시료와 시료 간의 물리적 성질(점도, 밀도, 표면장력 등)의 차이','화학적 간섭 : 불꽃의 온도가 분자를 들뜬 상태로 만들기에 충분히 높지 않아서, 해당 파장을 흡수하','이온화 간섭 : 불꽃온도가 너무 낮을 경우 중성원자에서 전자를 빼앗아 이온이 생성될 수 있으며 이'],answer:0,explain:'이온화 간섭: 불꽃 온도가 너무 높을 경우 중성원자에서 전자를 빼앗아 이온이 생성될 수 있으며, 이 경우 음(-)의 오차가 발생하게 된다. COD = (시료의 적정에 소비된 KMnO4 용액량 - 바탕 적정에 소비된 KMnO4 용액량)*1000*0.2*factor/ 시료의 부피',calc:false},
  {id:38,subject:4,exam:'2022-04',text:'35% HCI(비중 1.19)을 10% HCI으로 만들기 위한 35% HCI과 물의 용량비는?',choices:['1 : 1.5','3 : 1','1 : 3','1.5 : 1'],answer:2,explain:'35% HCl 용액 100g이 있다고 가정. HCl 성분 35g, 물+HCl 100g 10%로 만들기 위해 추가해야하는 물의 양 = 250g   (HCl 35g, 물+HCl 350g) 35% HCl 100g의 비중이 1.19 이므로',calc:false},
  {id:39,subject:4,exam:'2022-04',text:'분원성 대장균군-막여과법에서 배양온도 유지 기준은?',choices:['25±0.2℃','30±0.5℃','35±0.5℃','44.5±0.2℃'],answer:3,explain:'총대장균군 : 35 분원성대장균군 : 44.5',calc:false},
  {id:40,subject:4,exam:'2022-04',text:'ppm을 설명한 것으로 틀린 것은?',choices:['ppb농도의 1000배이다.','백만분율이라고 한다.','mg/kg이다.','%농도의 1/1000이다.'],answer:3,explain:'%농도의 1/10000이다.',calc:true},
  {id:41,subject:4,exam:'2022-04',text:'유도결합플라스마-원자발광분광법에 의한 원소별 정량한계로 틀린 것은?',choices:['Cu : 0.006mg/L','Pb : 0.004mg/L','Ni : 0.015mg/L','Mn : 0.002mg/L'],answer:1,explain:'유도결합플라스마-원자발광분광법 Pb: 0.04mg/L',calc:false},
  {id:42,subject:4,exam:'2022-04',text:'수질오염공정시험기준상 이온크로마토그래피법을 정량분석에 이용할 수 없는 항목은?',choices:['염소이온','아질산성 질소','질산성 질소','암모니아성 질소'],answer:3,explain:'이온크로마토그래피법: 음이온 측정 암모니아성 질소: 양이온',calc:false},
  {id:43,subject:4,exam:'2022-04',text:'자외선/가시선 분광법을 적용한 음이온계면활성제 측정에 관한 설명으로 틀린 것은?',choices:['정량한계는 0.02mg/L이다.','시료 중의 계면활성제를 종류별로 구분하여 측정할 수 없다.','시료 속에 미생물이 있는 경우 일부의 음이온 계면활성제가 신속히 변할 가능성이 있으므로 가능한','양이온 계면활성제가 존재할 경우 양의 오차가 발생한다.'],answer:1,explain:'양이온 계면활성제 혹인 아민과 같은 양이온 물질이 존재 할 경우 \'음의 오차\'가 발생할 수 있다. 시안은 최대보존기간 14일 입니다.',calc:false},
  {id:44,subject:4,exam:'2022-04',text:'용존산소(DO)측정 시 시료가 착색, 현탁된 경우에 사용하는 전처리시약은?',choices:['칼륨명반용액, 암모니아수','황산구리, 슬러민산용액','황산, 불화칼륨용액','황산제이철용액, 과산화수소'],answer:0,explain:'용존산소 전처리 착색,현탁된 경우:칼륨명반용액-암모니아수 플록 형성된 경우:황산구리-설퍼민산용액 산화성물질 함유된 경우(잔류염소):알칼리성 요오드화칼륨-아자이드화나트륨-황산-황산망간용액-전분',calc:false},
  {id:45,subject:4,exam:'2022-04',text:'수질오염공정시험기준상 총대장균군의 시험방법이 아닌 것은?',choices:['현미경계수법','막여과법','시험관법','평판집락법'],answer:0,explain:'현미경계수법: 현미경으로 관찰되는 개체를 직접 하나씩 세는 것 상식적으로 대장균은 직접 세기 어렵다.',calc:false},
  {id:46,subject:4,exam:'2022-04',text:'노말헥산추출물질 측정을 위한 시험방법에 관한 설명으로 ()에 옳은 것은?',choices:['메틸오렌지용액(0.1%) 2~3 방울을 넣고 황색이 적색으로','메틸오렌지용액(0.1%) 2~3 방울을 넣고 적색이 황색으로','메틸오렌지용액(0.5%) 2~3 방울을 넣고 황색이 적색으로','메틸오렌지용액(0.5%) 2~3 방울을 넣고 적색이 황색으로'],answer:0,explain:'1번이 정답입니다.',calc:false},
  {id:47,subject:4,exam:'2022-04',text:'전기전도도 측정에 관한 설명으로 틀린 것은?',choices:['용액이 전류를 운반할 수 있는 정도를 말한다.','온도차에 의한 영향이 적어 폭 넓게 적용된다.','용액에 담겨있는 2개의 전극에 일정한 전압을 가해주면 가압 전압이 전류를 흐르게 하며, 이 때 흐르','용액 중의 이온세기를 신속하게 평가할 수 있는 항목으로 국제적으로 S(Siemens)단위가 통용되고'],answer:1,explain:'전기전도도 측정계 중에서 25oC에서의 자체온도 보상 회로가 설치되어 있는 것이 사용하기에 편리하 다.',calc:false},
  {id:48,subject:4,exam:'2022-04',text:'크롬-원자흡수분광광도법의 정량한계에 관한 내용으로 ()에 옳은 것은?',choices:['㉠ 0.1, ㉡ 0.01','㉠ 0.01, ㉡ 0.1','㉠ 0.01, ㉡ 0.001','㉠ 0.001, ㉡ 0.01'],answer:2,explain:'3번이 정답입니다.',calc:false},
  {id:49,subject:4,exam:'2022-04',text:'온도에 관한 내용으로 옳지 않은 것은?',choices:['찬 곳은 따로 규정이 없는 한 0~15℃의 곳을 뜻한다.','냉수는 15℃이하를 말한다.','온수는 70~90℃를 말한다.','상온은 15~25℃를 말한다.'],answer:2,explain:'온수는 60~70도 사이를 말한다',calc:false},
  {id:50,subject:1,exam:'2022-03',text:'수질오염방지시설 중 물리적 처리시설에 해당되지 않는 것은?',choices:['유수분리시설','혼합시설','침전물 개량시설','응집시설'],answer:0,explain:'침전물 개량시설: 화학적 처리시설 매우 좋음: 용존산소 풍부, 간단처리 후 생활용수 좋음: 용존산소 많은 편, 일반처리 후 생활용수 약간 좋음: 약간의 오염물질, 일반처리 후 생활용수 또는 수영용수',calc:false},
  {id:51,subject:1,exam:'2022-03',text:'하천 모델 중 다음의 특징을 가지는 것은?',choices:['QUAL - Ⅰ','WQRRS','DO SAG - Ⅰ','HSPE'],answer:0,explain:'1. QUAL - Ⅰ - 유속, 수심, 조도계수에 의한 확산계수 결정 - 하천과 대기 사이의 열복사, 열교환 고려 - 음해법으로 미분방정식의 해를 구함.',calc:false},
  {id:52,subject:1,exam:'2022-03',text:'다음 중 수자원에 대한 특성으로 옳은 것은?',choices:['지하수는 지표수에 비하여 자연, 인위적인 국지조건에 따른 영향이 크다.','해수는 염분, 온도, pH 등 물리화학적 성상이 불안정하다.','하천수는 주변지질의 영향이 적고 유기물을 많이 함유하는 경우가 거의 없다.','우수의 주성분은 해수의 주성분과 거의 동일하다.'],answer:1,explain:'지구 물순환 중 가장 큰 역할은 증발이고 이러한 증발은 해수에서 90%이상 이루어지고 우수로 육지에 내려온다 KLA=0.06/0.75*(0.75*9.2-4.8) KLA=0.038/hr',calc:false},
  {id:53,subject:1,exam:'2022-03',text:'BOD곡선에서 탈산소 계수를 구하는데 적용되는 방법으로 가장 알맞은 것은?',choices:['O Connor – Dobbins 식','Thomas 도해법','Rippl 법','Tracer 법'],answer:1,explain:'O\'Connor-Dobbins : 재산소화계수 계산 Thomas 도해법 : BOD 곡선 파라미터 추정 Rippl 법 : 저수지 용량 추정 Tracer 법 : 하천 유속/혼합/체류 분석',calc:false},
  {id:54,subject:1,exam:'2022-03',text:'수질오염물질별 인체영향(질환)이 틀리게 짝지어진 것은?',choices:['비소 : 반상치(법랑반점)','크롬 : 비중력 연골천공','아연 : 기관지 자극 및 폐렴','납 : 근육과 관절의 장애'],answer:0,explain:'비소-피부염, 흑피증,  불소-반상치',calc:false},
  {id:55,subject:1,exam:'2022-03',text:'알칼리도에 관한 반응 중 가장 부적절한 것은?',choices:['CO2 + H2O → H2CO3 → HCO3- + H+','HCO3- → CO32- + H+','CO32- + H2O → HCO3- + OH-','HCO3- + H2O → H2CO3 + OH-'],answer:3,explain:'H2CO3 + OH- → HCO3- + H2O',calc:false},
  {id:56,subject:1,exam:'2022-03',text:'하천모델의 종류 중 DO SAG - Ⅰ, Ⅱ, Ⅲ에 관한 설명으로 틀린 것은?',choices:['2차원 정상상태 모델이다.','점오염원 및 비점오염원이 하천의 용존산소에 미치는 영향을 나타낼 수 있다.','Streeter-Phelps 식을 기본으로 한다.','저질의 영향이라 광합성 작용에 의한 용존산소반응을 무시한다.'],answer:1,explain:'1. 1차원 정상상태 모델이다 평판계수법: 생존가능한 세포수 측정 광학밀도 측정법: 총 세포량 변화분석 용존산소 소모율 측정법: 미생물의 대사활성 분석',calc:false},
  {id:57,subject:1,exam:'2022-03',text:'녹조류(Green Algae)에 관한 설명으로 틀린 것은?',choices:['조류 중 가장 큰 문(division)이다.','저장물질은 라미나린(다당류)이다.','세포벽은 섬유소이다.','클로로필 a, b를 가지고 있다.'],answer:2,explain:'2. 아밀로오스(다당류)를 저장한다. 응집력은 반대하전이온의 가수가 클수록 강함 콜로이드 : 음이온 하전 상태(-) → 반대이온 양이온(+) 3가(+) > 2가 (+) > 1가 (+)',calc:false},
  {id:58,subject:1,exam:'2022-03',text:'카드뮴이 인체에 미치는 영향으로 가장 거리가 먼 것은?',choices:['칼슘 대사기능 장해','Hunter-Russel 장해','골연화증','Fanconi씨 증후군'],answer:1,explain:'Hunter-russel - 수은중독',calc:false},
  {id:59,subject:1,exam:'2022-03',text:'우리나라의 수자원 특성에 대한 설명으로 잘못된 것은?',choices:['우리나라의 연간 강수량은 약 1274mm로서 이는 세계평균 강수량의 1.2배에 이른다.','우리나라의 1인당 강수량은 세계평균량의 1/11 정도이다.','우리나라 수자원의 총 이용율은 9% 이내로 OECD 국가에 비해 적은 편이다.','수자원 이용현황은 농업용수가 가장 많은 비율을 차지하고 있고 하천유지용소, 생활용수, 공업용수'],answer:2,explain:'우리나라 수자원의 총 이용율은 36% 이내로 OECD 국가에 비해 높은 편이다',calc:false},
  {id:60,subject:1,exam:'2022-03',text:'완충용액에 대한 설명으로 틀린 것은?',choices:['완충용액의 작용은 화학평형원리로 쉽게 설명된다.','완충용액은 한도 내에서 산을 가했을 때 pH에 약간의 변화만 준다.','완충용액은 보통 약산과 그 약산의 짝염기의 염을 함유한 용액이다.','완충용액은 보통 강염기와 그 염기의 강산의 염이 함유된 용액이다.'],answer:0,explain:'완충용액: 한정된 양의 산이나 염기 유입시 pH의 근소한 변화를 가져오는 용액 산 완충액: 약산과 그 약산의 강염기의 염 염기 완충액: 약염기와 그 약염기의 강산의 염 (1 poise = 1dyn•s/cm^2)',calc:false},
  {id:61,subject:1,exam:'2022-03',text:'수은(Hg) 중독과 관련이 없는 것은?',choices:['난청, 언어장애, 구심성 시야협착, 정신장애를 일으킨다.','이따이이따이병을 유발한다.','유기수은은 무기수은보다 독성이 강하며 신경계통에 장해를 준다.','무기수은은 황화물 침전법, 활성탄 흡착법, 이온교환법 등으로 처리할 수 있다.'],answer:1,explain:'카드뮴중동-이따이이따이병유발',calc:false},
  {id:62,subject:2,exam:'2022-03',text:'완전혼합 흐름 상태에 관한 설명 중 옳은 것은?',choices:['분산이 1일 때 이상적 완전혼합 상태이다.','분산수가 0일 때 이상적 완전혼합 상태이다.','Morrill 지수의 값이 1에 가까울수록 이상적 완전혼합 상태이다.','지체시간이 이론적 체류시간과 동일할 때 이상적 완전혼합 상태이다.'],answer:0,explain:'분산수가 ∞, Morrill지수가 클수록, 지체시간이 0일때 완전혼합상태임. HD=(11*50/12)+((8*50/20)+(2*50/44)=68.1',calc:false},
  {id:63,subject:2,exam:'2022-03',text:'하천표류수를 수원으로 할 때 하천기준 수량은?',choices:['평수량','갈수량','홍수량','최대홍수량'],answer:3,explain:'하천 유량의 구분 갈 저 평 풍 고 홍 갈수량: 1년 중 355일은 유지되는 유량 저수량: 1년 중 275일은 유지되는 유량',calc:false},
  {id:64,subject:2,exam:'2022-03',text:'상수처리를 위한 정수시설 중 착수정에 관한 내용으로 틀린 것은?',choices:['수위가 고수위 이상으로 올라가지 않도록 월류관이나 월류위어를 설치한다.','착수정의 고수위와 주변벽체의 상단 간에는 60cm 이상의 여유를 두어야 한다.','착수정의 용량은 체류시간을 30분 이상으로 한다.','필요에 따라 분말활성탄을 주입할 수 있는 장치를 설치하는 것이 바람직하다.'],answer:2,explain:'착수정의 체류시간 1.5분, 수심3~5m',calc:false},
  {id:65,subject:2,exam:'2022-03',text:'하수처리수 재이용 처리시설에 대한 계획으로 적합하지 않은 것은?',choices:['처리시설의 위치는 공공하수처리시설 부지내에 설치하는 것을 원칙으로 한다.','재이용수 공급관로는 계획시간최대유량을 기준으로 계획한다.','처리시설에서 발생되는 농축수는 공공하수처리시설로 반류하지 않도록 한다.','재이용수 저장시설 및 펌프장은 일최대공급유량을 기준으로 한다.'],answer:2,explain:'3. 처리시설에서 발생되는 농축수는 공공하수처리시설로 반류하도록 한다.',calc:false},
  {id:66,subject:2,exam:'2022-03',text:'계획오수량에 관한 설명으로 틀린 것은?',choices:['계획시간최대오수량은 계획1일 최대오수량의 1시간당 수량의 1.3~1.8배를 표준으로 한다.','지하수량은 1인 1일 최대오수량의 20% 이하로 한다.','합류식에서 우천 시 계획오수량은 원칙적으로 계획1일 최대오수량의 1.5배 이상으로 한다.','계획 1일 평균오수량은 계획1일 최대오수량의 70~80%를 표준으로 한다.'],answer:2,explain:'합류식에서 우천 시 계획오수량은 원칙적으로 계획시간최대오수량의 3배 이상으로 한다.',calc:false},
  {id:67,subject:2,exam:'2022-03',text:'펌프의 수격작용을 방지하기 위한 방법으로 틀린 것은?',choices:['펌프의 플라이휠을 제거하는 방법','토출관쪽에 조압수조를 설치하는 방법','펌프 토출측에 완폐체크밸브를 설치하는 방법','관내 유속을 낮추거나 관로상황을 변경하는 방법'],answer:0,explain:'1. 펌프에 플라이휠을 붙이는 방법 -> 펌프의 관성을 증가시켜 급격한 압력강하를 완화한다.',calc:false},
  {id:68,subject:2,exam:'2022-03',text:'하수도시설인 우수조정지의 여수토구에 관한 설명으로 ( ) 에 옳은 것은?',choices:['㉠ 10, ㉡ 1.2','㉠ 10, ㉡ 1.44','㉠ 100, ㉡ 1.2','㉠ 100, ㉡ 1.44'],answer:3,explain:'4번이 정답입니다.',calc:false},
  {id:69,subject:2,exam:'2022-03',text:'하수도시설의 목적과 가장 거리가 먼 것은?',choices:['침수방지','하수의 배제와 이와 따른 생활환경의 개선','공공수역의 수질보전과 건전한 물순환의 회복','폐수의 적정처리와 이에 따른 산업단지 환경개선'],answer:3,explain:'4. 지속 가능한 도시 구축에 기여',calc:false},
  {id:70,subject:2,exam:'2022-03',text:'하수처리에 사용되는 생물학적 처리공정 중 부유미생물을 이용한 공정이 아닌 것은?',choices:['산화구법','접촉산화법','질산화내생탈질법','막분리활성슬러지법'],answer:3,explain:'접촉산화법은 부착미생물을 이용한 공정이다 집수구멍의 직경은 10~20mm로 하며 그 수는 관거표면적 1m2당 20~30개 정도로 한다.',calc:false},
  {id:71,subject:2,exam:'2022-03',text:'정수방법인 완속여과방식에 관한 설명으로 틀린 것은?',choices:['약품처리가 필요 없다.','완속여과의 정화는 주로 생물작용에 의한 것이다.','비교적 양호한 원수에 알맞은 방식이다.','소요 부지면적이 작다.'],answer:3,explain:'소요부지면적이 크다',calc:false},
  {id:72,subject:2,exam:'2022-03',text:'펌프의 흡입관 설치요령으로 틀린 것은?',choices:['흡입관은 펌프 1대당 하나로 한다.','흡입관이 길 때에는 중간에 진동방지대를 설치할 수도 있다.','흡입관은 연결부나 기타 부분으로부터 절대로 공기가 흡입하지 않도록 한다.','흡입관과 취수정 바닥까지의 깊이는 흡인관 직경의 1.5배 이상으로 유격을 둔다.'],answer:3,explain:'흡입관과 흡수정 벽체사이의 거리는 관경의 1.5배 이상 두어야 한다',calc:false},
  {id:73,subject:2,exam:'2022-03',text:'막여과법을 정수처리에 적용하는 주된 선정 이유로 가장 거리가 먼 것은?',choices:['응집제를 사용하지 않거나 또는 적게 사용한다.','막의 특성에 따라 원수 중의 현탁물질, 콜로이드, 세균류, 크립토스포리디움 등 일정한 크기 이상의','부지면적이 종래보다 적을 뿐 아니라 시설의 건설공사기간도 짧다.','막의 교환이나 세척 없이 반영구적으로 자동운전이 가능하여 유지관리 측면에서 에너지를 절약할 수'],answer:2,explain:'4. 정기 점검이나 막의 약품세척, 막의 교환이 필요하지만, 자동 운전이 용이하고, 일상적인 운전과 유지 관리에서 에너지를 절약할 수 있다. 지선관로 : 10년 / 간선관로 : 30년 / 빗물펌프장 : 30년',calc:false},
  {id:74,subject:2,exam:'2022-03',text:'상수처리를 위한 정수시설인 급속여과지에 관한 설명으로 틀린 것은?',choices:['여과속도는 120~150 m/day를 표준으로 한다.','플록의 질이 일정한 것으로 가정하였을 때 여과층의 필요두께는 여재입경에 반비례한다.','여과면적은 계획정수량을 여과속도로 나누어 계산한다.','여과지 1지의 여과면적은 150m2 이하로 한다.'],answer:1,explain:'여과층의 필요두께는 여재입경, 여과속도에 비례한다.',calc:false},
  {id:75,subject:2,exam:'2022-03',text:'정수시설의 시설능력에 관한 설명으로 ( )에 옳은 것은?',choices:['70%','75%','80%','85%'],answer:1,explain:'2번이 정답입니다.',calc:false},
  {id:76,subject:2,exam:'2022-03',text:'상수도 취수시설 중 취수틀에 관한 설명으로 옳지 않은 것은?',choices:['구조가 간단하고 시공도 비교적 용이하다.','수중에 설치되므로 호소표면수는 취수할 수 없다.','단기간에 완성하고 안정된 취사가 가능하다.','보통 대형취수에 사용되며 수위변화에 영향이 적다.'],answer:3,explain:'중소량 취수시설로 많이 사용된다. Q= A*V V=1/N * (R)^2/3 * (I)^1/2 A= 3.14*0.4^2/4',calc:false},
  {id:77,subject:3,exam:'2022-03',text:'하수도 관로의 접합방법 중 아래 설명에 해당되는 것은?',choices:['수면접합','관저접합','동수접합','관정접합'],answer:0,explain:'360*0.1*0.04*(100/28)=5.14 반송율(%) = 3000/(8000-3000)*100 = 60(%) 반송율 = 3000/(8000-3000) = 0.6',calc:false},
  {id:78,subject:3,exam:'2022-03',text:'수은계 폐수 처리방법으로 틀린 것은?',choices:['수산화물침전법','흡착법','이온교환법','황화물침전법'],answer:0,explain:'무기수은계 폐수처리방법 : 아말감법, 흡착법, 이온교환법, 황화물침전법 유기수은계 폐수처리방법 : 산화분해법',calc:false},
  {id:79,subject:3,exam:'2022-03',text:'생물학적 질소, 인 처리공정인 5단계 Bardenpho 공법에 관한 설명으로 틀린 것은?',choices:['폐슬러지내의 인의 농도가 높다.','1차 무산소조에서는 탈질화 현상으로 질소 제거가 이루어진다.','호기성조에서는 질산화와 인의 방출이 이루어진다.','2차 무산소조에서는 잔류 질산성질소가 제거된다.'],answer:2,explain:'호기성조에서 인의 과잉 흡수 및 질산화 3V * (100 - 98 ) = V * ( 100 - P )',calc:false},
  {id:80,subject:3,exam:'2022-03',text:'활성슬러지 공법으로 폐수를 처리할 경우 산소요구량 결정에 중요한 인자가 아닌 것은?',choices:['유입수의 BOD와 처리수의 BOD','포기시간과 고형물 체류시간','포기조 내의 MLSS 중 미생물 농도','유입수의 SS와 DO'],answer:3,explain:'1/SRT 공식 참조',calc:false},
  {id:81,subject:3,exam:'2022-03',text:'질소 제거를 위한 파괴점 염소 주입법에 관한 설명과 가장 거리가 먼 것은?',choices:['적절한 운전으로 모든 암모니아성 질소의 산화가 가능하다.','시설비가 낮고 기존 시설에 적용이 용이하다.','수생생물에 독성을 끼치는 잔류염소농도가 높아진다.','독성물질과 온도에 민감하다.'],answer:3,explain:'파과점 염소 주입법은 독성과 온도에 민감하지 않다.',calc:false},
  {id:82,subject:3,exam:'2022-03',text:'정수장에 적용되는 완속여과의 장점이라 볼 수 없는 것은?',choices:['여과시스템의 신뢰성이 높고 양질의 음용수를 얻을 수 있다.','수량과 탁질의 급격한 부하변동에 대응할 수 있다.','고도의 지식이나 기술을 가진 운전자를 필요로 하지 않고 최소한의 전력만 필요로 한다.','여과지를 간헐적으로 사용하여도 양질의 여과수를 얻을 수 있다.'],answer:3,explain:'완속여과는 표면층에 있는 미생물의 작용으로 처리하는 것인데 간헐적으로 사용하게 되면 미생물의 처리 기능이 떨어지게 되므로 여과수의 수질이 저하된다.',calc:false},
  {id:83,subject:3,exam:'2022-03',text:'생물학적 질소, 인제거를 위한 A2/O 공정 중 호기조의 역할로 옳게 짝지은 것은?',choices:['질산화, 인방출','질산화, 인흡수','탈질화, 인방출','탈질화, 인흡수'],answer:1,explain:'A2/O공정: 혐기조/무산소조/호기조 혐기조 -> 인 방출 무산소조 -> 탈질화 호기조 -> 질산화, 인 섭취(인 흡수)',calc:false},
  {id:84,subject:3,exam:'2022-03',text:'생물학적 처리 중 호기성 처리법이 아닌 것은?',choices:['활성슬러지법','혐기성소화법','산화지법','살수여상법'],answer:0,explain:'1번이 정답입니다.',calc:false},
  {id:85,subject:3,exam:'2022-03',text:'초심층포기법(Deep Shaft Aeration System)에 대한 설명 중 틀린 것은?',choices:['기포와 미생물이 접촉하는 시간이 표준활성슬러지법 보다 길어서 산소전달 효율이 높다.','순환류의 유속이 매우 빠르기 때문에 난류상태가 되어 산소전달율을 증가시킨다.','F/M비는 표준활성슬러지공법에 비하여 낮게 운전한다.','표준활성슬러지공법에 비하여 MLSS 농도를 높게 운전한다.'],answer:2,explain:'소요 면적이 적다 산소전달율이 높다 높은 F/M비로 운전 MLSS농도도 활성슬러지에 비해 높다',calc:false},
  {id:86,subject:3,exam:'2022-03',text:'자외선 살균효과가 가장 높은 파장의 범위(mm)는?',choices:['680~710','510~530','250~270','180~200'],answer:0,explain:'자외선 살균 효과가 가장 높은 파장 범위는 250~260nm 입니다. 이 범위는 미생물의 DNA에 흡수되어 D NA 손상을 일으켜 살균 효과를 나타냅니다 6NO3^-1 + 2CH3OH → 6NO2^- + 2CO2 + 4H2O 6NO2^- + 3CH3OH → 3N2+ 3CO2 + 3H2O + 6OH^-',calc:false},
  {id:87,subject:3,exam:'2022-03',text:'흡착장치 중 고정상 흡착장치의 역세척에 관한 설명으로 가장 알맞은 것은?',choices:['㉠ 24시간, ㉡ 14~48, ㉢ 25~30%','㉠ 24시간, ㉡ 24~28, ㉢ 10~50%','㉠ 10~15분, ㉡ 14~48, ㉢ 25~30%','㉠ 10~15분, ㉡ 24~28, ㉢ 10~50%'],answer:3,explain:'4번이 정답입니다.',calc:false},
  {id:88,subject:4,exam:'2022-03',text:'침사지의 설치 목적으로 잘못된 것은?',choices:['펌프나 기계설비의 마모 및 파손방지','관의 폐쇄 방지','활성슬러지의 dead space 등에 사석이 쌓이는 것을 방지','침전지와 슬러지 소화조 내의 축적'],answer:3,explain:'20 * 0.9 = 25 * x, x = 0.72m/s 공식 대입 (0.9^2 - 0.72^2)/(2*9.8*0.7) = 0.0212 호수 중 인 농도 변화 250µg/L -> 40µg/L, 변화량 210µg/L,',calc:false},
  {id:89,subject:4,exam:'2022-03',text:'노말핵산 추출물질의 정도관리로 맞는 것은?',choices:['정량한계는 0.5mg/L로 설정하였다.','상대표준편차가 ±35% 이내이면 만족한다.','정확도가 110%여서 재시험을 수행하였다.','정밀도가 10%여서 재시험을 수행하였다.'],answer:0,explain:'3. 정확도 75~125% 이내 4. 정밀도 25% 이내',calc:false},
  {id:90,subject:4,exam:'2022-03',text:'투명도 측정에 관한 내용으로 틀린 것은?',choices:['투명도판(백색원판)의 지름인 30cm 이다.','투명도판에 뚫린 구멍의 지름은 5cm 이다.','투명도판에는 구멍이 8개 뚫려있다.','투명도판의 무게는 약 2kg 이다.'],answer:3,explain:'무게 3kg',calc:false},
  {id:91,subject:4,exam:'2022-03',text:'노말 핵산 추출물질을 측정할대 시험과정 중 지시약으로 사용되는 것은?',choices:['메틸레드','메틸오렌지','메틸렌블루','페놀프탈레인'],answer:0,explain:'메틸오렌지 -> 노말 헥산 메틸블루 -> ABS음이온계면활성제 자외선/가시광선 분광법에 사용으로 비교해서 외워두기',calc:false},
  {id:92,subject:4,exam:'2022-03',text:'수중 시안을 측정하는 방법으로 가장 거리가 먼 것은?',choices:['자외선/가시선 분광법','이온전극법','이온크로마토그래피법','연속흐름법'],answer:2,explain:'이온크로마토그래피: 시안(CN-) 제외한 음이온에 적용',calc:false},
  {id:93,subject:4,exam:'2022-03',text:'시료의 전처리를 위한 산분해법 중 질산-과염소산법에 관한 설명으로 옳지 않은 것은?',choices:['과염소산을 넣을 경우 질산이 공존하지 않으면 폭발할 위험이 있으므로 반드시 질산을 먼저 넣어 주','납을 측정할 경우 과염소산에 따른 납 증기 발생으로 측정치에 손실을 가져온다.','유기물을 다량 함유하고 있으면서 산분해가 어려운 시료들에 적용한다.','유기물을 함유한 뜨거운 용액에 과염소산을 넣어서는 안 된다.'],answer:1,explain:'납을 측정할 경우에 황산이온이 다량 존재하면 불용성의 황산납이 생성되어 측정값에 손실을 가져온다.',calc:false},
  {id:94,subject:4,exam:'2022-03',text:'물 1L에 NaOH 0.8g이 용해되었을 때의 농도(몰)은?',choices:['0.1','0.2','0.01','0.02'],answer:3,explain:'0.8g/40(g/mol)=0.02M',calc:false},
  {id:95,subject:4,exam:'2022-03',text:'이온전극법에 대한 설명으로 틀린 것은?',choices:['시료용액의 교반은 이온전극의 응답속도는 이외의 전극범위, 정량한계값에는 영향을 미치지 않는다.','전극과 비교전극을 사용하여 전위를 측정하고 그 전위차로부터 정량하는 방법이다.','이온전극법에 사용하는 장치의 기본구성은 비교전극, 이온전극, 자석교반기, 저항 전위계, 이온측정','이온전극의 종류에는 유리막 전극, 고체막 전극, 격막형 전극이 있다.'],answer:0,explain:'시료용액의 교반은 이온전극의 전극범위, 응답속도, 정량한계값에 영향을 나타낸다. 그러므로 측정에 방해되지 않는 범위내에서 세게 일정한 속도로 교반해야 한다.',calc:false},
  {id:96,subject:4,exam:'2022-03',text:'분원성 대장균군(시험관법)측정에 관한 내용으로 틀린 것은?',choices:['분원성 대장균군 시험은 추정시험과 확정시험으로 한다.','최적확수시험 결과는 분원성 대장균수는/1000mL로 표시한다.','확정시험에서 가스가 발생한 시료는 분원성 대장균군 양성으로 판정한다.','분원성 대장균군은 온혈동물의 배성물에서 발견된 그람음성·무아포성의 간균으로서 44.5℃에서 락'],answer:1,explain:'분원성 대장균수는/100mL로 표시',calc:false},
  {id:97,subject:4,exam:'2022-03',text:'용존산소의 정량에 관한 설명으로 틀린 것은?',choices:['전극법은 산화성물질이 함유된 시료나 착색된 시료에 적합하다.','일반적으로 온도가 일정할때 용존산소 포화량은 수중의 염소이온량이 클수록 크다.','시료가 착색, 현탁된 경우는 시료에 칼륨명반 용액과 암모니아수를 주입한다.','Fe(Ⅲ) 100~200mg/L가 함유되어 있는 시료의 경우 황산을 첨가하기 전에 플루오린화칼륨용액 1'],answer:2,explain:'용존산소 포화량은 수중의 염소이온량과 반비례한다 관내 유량측정방법들 중 벤튜리미터, 노즐, 오리피스의 최대유량에 대한 최소유량의 범위가 동일하게 4: 1 최소값은 피토우관의 3:1',calc:false},
  {id:98,subject:4,exam:'2022-03',text:'기체크로마토그래피를 적용한 알킬수은 정량에 관한 내용으로 틀린 것은?',choices:['검출기는 전자포획형 검출기를 사용하고 검출기의 온도는 140~200℃로 한다.','정량한계는 0.0005 mg/L 이다.','알킬수은화합물을 사염화탄소로 추출한다.','정밀도(% RSD)는 ±25% 이다.'],answer:2,explain:'벤젠으로 추출한다.',calc:false},
  {id:99,subject:4,exam:'2022-03',text:'자외선/가시선을 이용한 음이온 계면활성제 측정에 관한 내용으로 ( ) 에 옳은 내용은?',choices:['㉠ 메틸레드, ㉡ 적색','㉠ 메틸렌레드, ㉡ 적자색','㉠ 메틸오렌지, ㉡ 황색','㉠ 메틸레블루, ㉡ 청색'],answer:3,explain:'식물성 플랑크톤은 즉시 분석 또는 포르말린용액을 시료의 3~5% 가하거나 글루타르알데하이드 또는 루 골용액을 시료의 1~2% 가하여 냉암소보관을 합니다.',calc:false},
  {id:100,subject:4,exam:'2022-03',text:'염소이온 측정방법 중 질산은 적정법의 정량한계(mg/L)는?',choices:['0.1','0.3','0.5','0.7'],answer:3,explain:'4번이 정답입니다.',calc:true},
  {id:101,subject:4,exam:'2022-03',text:'수질분석을 위한 시료 채취 시 유의사항으로 옳지 않은 것은?',choices:['채취용기는 시료를 채우기 전에 맑은 물로 3회 이상 씻은 다음 사용한다.','용존가스, 환원성 물질, 휘발성 유기물질 등의 측정을 위한 시료는 운반중 공기와의 접촉이 없도록','지하수 시료는 취수정 내에 고여 있는 물을 충분히 퍼낸(고여 있는 물의 4~5배 정도이나 pH 및 전기','시료채취량은 시험항목 및 시험횟수에 따라 차이가 있으나 보통 3~5L 정도이어야 한다.'],answer:0,explain:'시료로 3회 이상 씻은 다음 사용한다.',calc:false},
  {id:102,subject:4,exam:'2022-03',text:'기체크로마토그래피법의 전자포획검출기에 관한 설명으로 ( ) 에 알맞은 것은?',choices:['α(알파)선','β(베타)선','γ(감마)선','중성자선'],answer:1,explain:'α(알파)선: He2+(헬륨 원자핵) β(베타)선: e-(전자) γ(감마)선: 전자기파의 일종',calc:false},
  {id:103,subject:1,exam:'2021-08',text:'하수도법에서 사용하는 용어에 대한 정의가 틀린 것은?',choices:['분뇨는 수거식 화장실에서 수거되는 액체성 또는 고체성의 오염물질이다.','합류식하수관로는 오수와 하수도로 유입되는 빗물·지하수가 함께 흐르도록 하기 위한 하수관로이다.','분뇨처리시설은 분뇨를 침전·분해 등의 방법으로 처리하는 시설이다.','배수구역은 하수를 공공하수처리시설에 유입하여 처리할 수 있는 지역이다.'],answer:2,explain:'배수구역 : 공공하수도에 의하여 하수를 유출시킬 수 있는 지역 4번 설명은 하수처리구역 (시도지사) 수립 ㅡ 계획 내용 할당',calc:false},
  {id:104,subject:1,exam:'2021-08',text:'미생물 영양원 중 유황(sulfur)에 관한 설명으로 틀린 것은?',choices:['황환원세균은 편성 혐기성 세균이다.','유황을 함유한 아미노산은 세포 단백질의 필수 구성원이다.','미생물세포에서 탄소 대 유황의 비는 100:1 정도이다.','유황고정, 유황화합물 환원, 산화 순으로 변환된다.'],answer:2,explain:'4. 환원, 산화, 유황고정의 순으로 변환과정을 거친다. D = 0.1*20/(0.2-0.1)*(10^-0.1*3 - 10^-0.2*3)+(9-5)*10^-0.2*3 = 6.00mg/L 3일 후 DO(mg/L) = 9-6 = 3mg/L NBDICOD=ICOD-BDICOD=ICOD-IBODu',calc:false},
  {id:105,subject:1,exam:'2021-08',text:'이상적 완전혼합형 반응조내 흐름(혼합)에 관한 설명으로 틀린 것은?',choices:['분산수(dispersion number)가 0에 가까울수록 완전혼합 흐름상태라 할 수 있다.','Morrill지수의 값이 클수록 이상적인 완전혼합 흐름상태에 가깝다.','분산(Variance)이 1일 때 완전혼합 흐름상태라 할 수 있다.','지체시간(lag time)이 0이다.'],answer:0,explain:'분산수가 0에 가까울 때가 아니라 무한대일 때 3000*0.3=900 3000*0.7*0.4=840 900+840=1740',calc:false},
  {id:106,subject:1,exam:'2021-08',text:'Formaldehyde(CH2O) 500mg/L의 이론적 COD값(mg/L)은?',choices:['약 512','약 533','약 553','약 576'],answer:1,explain:'CH2O+O2->CO2+H2O 30:32=500:X X=500*32/30=533.33',calc:true},
  {id:107,subject:1,exam:'2021-08',text:'담수와 해수에 대한 일반적인 설명으로 틀린 것은?',choices:['해수의 용존산소 포화도는 주로 염류 때문에 담수보다 작다.','upwelling은 담수가 해수의 표면으로 상승하는 현상이다.','해수의 주성분으로는 Cl-, Na+, SO42- 등이 있다.','하구에서는 담수와 해수가 쐐기 형상으로 교차한다.'],answer:2,explain:'2. 담수가 아니라 비교적 찬 해수가 표층해수를 제치고 올라오는 현상 t=(378km*1000m/km)/(56m/min*1440min/day)=4.6875day BODt=BODu*10^(-kt)=280*10^(-0.1*4.6875)=95.15 우선 CH3COOH 몰농도부터 구하게 되면 3g/L = (3/60)mol/L = 0.05M',calc:false},
  {id:108,subject:1,exam:'2021-08',text:'소수성 콜로이드의 특성으로 틀린 것은?',choices:['물과 반발하는 성질을 가진다.','물속에 현탁상태로 존재한다.','아주 작은 입자로 존재한다.','염에 큰 영향을 받지 않는다.'],answer:3,explain:'소수성 콜로이드는 염에 민감하다. (친수성 콜로이드와 반대)',calc:false},
  {id:109,subject:1,exam:'2021-08',text:'연속류 교반 반응조(CFSTR)에 관한 내용으로 틀린 것은?',choices:['충격부하에 강하다.','부하변동에 강하다.','유입된 액체의 일부분은 즉시 유출된다.','동일 용량 PFR에 비해 제거효율이 좋다.'],answer:2,explain:'같은 효율상에서 필요로하는 부피비를 구하게 되면 CMFR이 PFR보다 3.91배 더 차지한다. 따라서 동일 용량 시 PFR이 더 효율이 우수하다. 아질산은 생성된 뒤 빠른시간 내 질산으로 전환되므로 아질산이 제일 적다 *현장공기추출법',calc:false},
  {id:110,subject:1,exam:'2021-08',text:'다음 유기물 1M이 완전산화될 때 이론적인 산소요구량(ThOD)이 가장 적은 것은?',choices:['C6H6','C6H12O6','C2H5OH','CH3COOH'],answer:3,explain:'C6H6+15/2O2->6CO2+3H2O C6H12O6+6O2->6CO2+6H2O C2H5OH+3O2->2CO2+3H2O CH3COOH+2O2->2CO2+2H2O',calc:false},
  {id:111,subject:1,exam:'2021-08',text:'생물농축에 대한 설명으로 가장 거리가 먼 것은?',choices:['생물농축은 생태계에서 영양단계가 낮을수록 현저하게 나타난다.','독성물질 뿐 아니라 영양물질도 똑같이 물질 순환을 통해 축적될 수 있다.','생물체내의 오염물질 농도는 환경수중의 농도보다 일반적으로 높다.','생물체는 서식장소에 존재하는 물질의 필요 유무에 관계없이 섭취한다.'],answer:0,explain:'1. 높을수록 현저하게 나타난다.',calc:false},
  {id:112,subject:2,exam:'2021-08',text:'해수의 HOLY SEVEN에서 가장 농도가 낮은 것은?',choices:['CI-','Mg2+','Ca2+','HCO3-'],answer:3,explain:'해수의 농도 순 Cl-  >  Na+  >  SO42-  >  Mg2+  >  Ca2+  >  K+  >  HCO3- 활발한 분해지대에서 곰팡이는 사라진다.',calc:false},
  {id:113,subject:2,exam:'2021-08',text:'다음 중 생물막법과 가장 거리가 먼 것은?',choices:['살수여상법','회전원판법','접촉산화법','산화구법'],answer:3,explain:'생물학적 처리법은 크게 활성슬러지공법, 산화지법, 생물막공법으로 나뉘고 그 중 생물막 공법으로 살수 여상법, 회전원판법, 접촉산화법이 있다.',calc:false},
  {id:114,subject:2,exam:'2021-08',text:'취수보의 위치와 구조 결정 시 고려할 사항으로 적절하지 않은 것은?',choices:['유심이 취수구에 가까우며, 홍수에 의한 하상변화가 적은 지점으로 한다.','홍수의 유심방향과 직각의 직선형으로 가능한 한 하천의 직선부에 설치한다.','고정보의 상단 또는 가동보의 상단 높이는 유하단면 내에 설치한다.','원칙적으로 철근콘크리트구조로 한다.'],answer:2,explain:'홍수시 유수가 안전하게 유하되게 하기 위해 유하단면 확보가 필요하므로 고정보의 상단 퐁이 또는 가동 보의 상단높이는 유하단면내에 설치하지 않는다.',calc:false},
  {id:115,subject:2,exam:'2021-08',text:'하수의 배제방식 중 합류식에 관한 설명으로 틀린 것은?',choices:['관거내의 보수 : 폐쇄의 염려가 없다.','토지이용 : 기존의 측구를 폐지할 경우는 도로폭을 유효하게 이용할 수 있다.','관거오접 : 철저한 감시가 필요하다.','시공 : 대구경관거가 되면 좁은 도로에서의 매설에 어려움이 있다.'],answer:2,explain:'3. 분류식에 대한 설명',calc:false},
  {id:116,subject:2,exam:'2021-08',text:'취수탑의 위치에 관한 내용으로 ( )에 옳은 것은?',choices:['1m','2m','3m','4m'],answer:1,explain:'2번이 정답입니다.',calc:false},
  {id:117,subject:2,exam:'2021-08',text:'펌프의 캐비테이션이 발생하는 것을 방지하기 위한 대책으로 잘못된 것은?',choices:['펌프의 설치위치를 가능한 낮추어 가용유효흡입수두를 크게 한다.','흡입관의 손실을 가능한 작게 하여 가용유효흡입수두를 크게 한다.','펌프의 회전속도를 높게 선정하여 필요유효흡입수두를 크게 한다.','흡입측 밸브를 완전히 개방하고 펌프를 운전한다.'],answer:1,explain:'가용유효흡입수두 크게 필요유효흡입수두 작게 하수구용, 우수용 펌프는 사류펌프.',calc:false},
  {id:118,subject:2,exam:'2021-08',text:'상수시설 중 배수시설을 설계하고 정비할 때에 설계상의 기본적인 사항 중 옳은 것은?',choices:['배수지의 용량은 시간변동조정용량, 비상시대처용량, 소화용수량 등을 고려하여 계획시간최대급수','배수관을 계획할 때에 지역의 특성과 상황에 따라 직결급수의 범위를 확대하는 것 등을 고려하여 최','배수본관은 단순한 수지상 배관으로 하지 말고 가능한 한 상호 연결된 관망형태로 구성한다.','배수지관의 경우 급수관을 분기하는 지점에서 배수관내의 최대정수압은 150kPa을 넘지 않도록 한'],answer:2,explain:'1. 배수지의 용량은 시간변동조정용량과 비상대처용량을 합하여 급수구역의 계획1일최대급수량의 12시 간분 이상을 표준으로 한다. 2. 배수관을 계획할 때에 ~ 등을 고려하여 최소동수압을 결정하며, 수압의 기준점은 지표면상으로 한다. 4. 배수관내의 최대정수압은 700kPa를 넘지 않도록 한다.',calc:false},
  {id:119,subject:2,exam:'2021-08',text:'하수도 계획에 대한 설명으로 옳은 것은?',choices:['하수도 계획의 목표연도는 원칙적으로 30년으로 한다.','하수도 계획구역은 행정상의 경계구역을 중심으로 수립한다.','새로운 시가지의 개발에 따른 하수도계획구역은 기존시가지를 포함한 종합적인 하수도계획의 일환','하수처리구역의 경계는 자연유하에 의한 하수배제를 위해 배수구역 경계와 교차하도록 한다.'],answer:2,explain:'1. 하수도계획의 목표연도는 20년을 원칙으로 한다. 2. 하수도 계획구역은 원칙적으로 관할 행정구역 전체를 대상으로 하되, 지역조건을 고려하여 행정경계 이외 구역도 정한다. 3. 새로운 시가지의 개발에 따른 하수도계획구역은 기존시가지를 포함한 종합적인 하수도계획의 일환으',calc:false},
  {id:120,subject:2,exam:'2021-08',text:'고도정수 처리 시 해당물질의 처리방법으로 가장 거리가 먼 것은?',choices:['pH가 낮은 경우에는 플록형성 후에 알칼리제를 주입하여 pH를 조정한다.','색도가 높을 경우에는 응집침전처리, 활성탄처리 또는 오존처리를 한다.','음이온 계면활성제를 다량 함유한 경우에는 응집 또는 염소처리를 한다.','원수 중에 불소가 과량으로 포함된 경우에는 응집처리, 활성알루미나, 골탄, 전해 등의 처리를 한다.'],answer:2,explain:'3. 음이온계면활성제는 활성탄여과처리',calc:false},
  {id:121,subject:2,exam:'2021-08',text:'상수도 수요량 산정 시 불필요한 항목은?',choices:['계획1인1일 최대사용량','계획1인1일 평균급수량','계획1인1일 최대급수량','계획1인당 시간최대급수량'],answer:0,explain:'1번이 정답입니다.',calc:false},
  {id:122,subject:2,exam:'2021-08',text:'정수시설인 배수지에 관한 내용으로 ( )에 옳은 내용은?',choices:['4시간분 이상','8시간분 이상','12시간분 이상','24시간분 이상'],answer:2,explain:'3번이 정답입니다.',calc:false},
  {id:123,subject:2,exam:'2021-08',text:'계획우수량을 정할 때 고려하여야 할 사항 중 틀린 것은?',choices:['하수관거의 확률년수는 원칙적으로 10~30년으로 한다.','유입시간은 최소단위배수구의 지표면특성을 고려하여 구한다.','유출계수는 지형도를 기초로 답사를 통하여 충분히 조사하고 장래 개발계획을 고려하여 구한다.','유하시간은 최상류관거의 끝으로부터 하류관거의 어떤 지점까지의 거리를 계획유량에 대응한 유속'],answer:2,explain:'유출계수는 토지이용도별 기초유출계수로부터 총괄유수계수를 구하는 것을 원칙으로 한다. 면적 3.0km^2 = 300ha 유달시간 = 유입시간 + 유하시간, 유하시간 = 600m/1m/s = 600sec = 10min 유달시간 = 6min + 10min = 16min',calc:false},
  {id:124,subject:2,exam:'2021-08',text:'활성슬러지법에서 사용하는 수중형 포기장치에 관한 설명으로 틀린 것은?',choices:['저속터빈과 압력튜브 혹은 보통관을 통한 압축공기를 주입하는 형식이다.','혼합정도가 좋으며 단위용량당주입량이 크다.','깊은 반응조에 적용하며 운전에 융통성이 있다.','송풍조의 규모를 줄일 수 있어 전기료가 적게 소요된다.'],answer:3,explain:'기어감속기와 송풍조가 소요되며 전기료가 많이 든다.',calc:false},
  {id:125,subject:2,exam:'2021-08',text:'정수시설인 착수정의 용량기준으로 적절한 것은?',choices:['체류시간 : 0.5분 이상, 수심 : 2~4m 정도','체류시간 : 1.0분 이상, 수심 : 2~4m 정도','체류시간 : 1.5분 이상, 수심 : 3~5m 정도','체류시간 : 1.0분 이상, 수심 : 3~5m 정도'],answer:2,explain:'- 착수정은 2지 이상으로 분할하는 것이 원칙이나 분할하지 않는 경우에는 반드시 우회관을 설치하며 배 수설비를 설치 - 형상 : 직사각형, 원형 - 유입구에 제수밸브 등을 설치하며, 2~3실로 구분하는 것이 바람직',calc:false},
  {id:126,subject:2,exam:'2021-08',text:'막여과시설에서 막모듈의 열화에 대한 내용으로 틀린 것은?',choices:['미생물과 막 재질의 자화 또는 분비물의 작용에 의한 변화','산화제에 의하여 막 재질의 특성변화나 분해','건조되거나 수축으로 인한 막 구조의 비가역적인 변화','응집제 투입에 따른 막모듈의 공급유로가 고형물로 폐색'],answer:3,explain:'4. 파울링에 대한 설명',calc:false},
  {id:127,subject:3,exam:'2021-08',text:'정수시설인 하니콤방식에 관한 설명으로 틀린 것은? (단, 회전원판방식과 비교 기준)',choices:['체류시간 : 2시간 정도','손실수두 : 거의 없음','폭기설비 : 필요 없음','처리수조의 깊이 : 5~7m'],answer:3,explain:'하니콤방식은 폭기설비를 사용하지 않는 회전원판법과는 다르게 폭기설비가 필요하다. 유달시간 = 유입시간 + 유하시간 =   5분    + 1200m/(1m/sec) =   5분    + 20min = 25분',calc:false},
  {id:128,subject:3,exam:'2021-08',text:'생물막을 이용한 하수처리방식인 접촉산화법의 설명으로 틀린 것은?',choices:['분해속도가 낮은 기질제거에 효과적이다.','난분해성물질 및 유해물질에 대한 내성이 높다.','고부하시에도 매체의 공극으로 인하여 폐쇄위험이 적다.','매체에 생성되는 생물량은 부하조건에 의하여 결정된다.'],answer:0,explain:'3. 고부하시 생물막 비대화로 접촉재가 막힐 수 있음 공정의 부피=길이*폭*깊이 =  2m^2*2m =  4m^3',calc:false},
  {id:129,subject:3,exam:'2021-08',text:'혐기성 소화조 설계 시 고려해야 할 사항과 관계가 먼 것은?',choices:['소요산소량','슬러지 소화정도','슬러지 소화를 위한 온도','소화조에 주입되는 슬러지의 양과 특성'],answer:0,explain:'혐기성 공법 산소필요x 250일 동안 500개의 정화조에서 수거함으로 1일 2개의 정화조에서 슬러지 수거 기존 하수처리장 슬러지 농도 : 3800*0.22 = 836kg/m^3 정화조 수거량 : 3.8*6*2 = 45.6',calc:false},
  {id:130,subject:3,exam:'2021-08',text:'막공법에 관한 설명으로 가장 거리가 먼 것은?',choices:['투석은 선택적 투과막을 통해 용액 중에 다른 이온, 혹은 분자 크기가 다른 용질을 분리시키는 것이','투석에 대한 추진력은 막을 기준으로 한 용질의 농도차이다.','한외여과 및 미여과의 분리는 주로 여과작용에 의한 것으로 역삼투현상에 의한 것이 아니다.','역삼투는 반투막으로 용매를 통과시키기 위해 동수압을 이용한다.'],answer:1,explain:'4. 정수압 이용 200mg/L = 200 * 10^-3g/L = 200 * 10^-3 * 10^3g/10^3L = 200 * 10^-3kg/m^3 Al2(SO4)3 최적주입농도 200 * 10^-3kg/m^3 * 유량 500m^3/day = 100kg/day Q=500m^3/day',calc:false},
  {id:131,subject:4,exam:'2021-08',text:'정수장에서 사용하는 소독제의 특성과 가장 거리가 먼 것은?',choices:['미잔류성','저렴한 가격','주입조작 및 취급이 쉬울 것','병원성 미생물에 대한 효과적 살균'],answer:0,explain:'상수도를 통해 수돗물을 공급할 때, 인체에 유해하지 않을 정도의 염소를 잔류시켜 공급하는 과정에서의 오염을 방지한다. Q = A * V  A = L*B = 70m^2, 해당 면적은 여과지 1지당 면적. Q/V = 30000m^3/day / 120m/day = 250m^2',calc:false},
  {id:132,subject:4,exam:'2021-08',text:'식물성 플랑크톤 시험 방법으로 옳은 것은? (단, 수질오염공정시험기준 기준)',choices:['현미경계수법','최적확수법','평판집락계수법','시험관정량법'],answer:2,explain:'3각웨어 유량(Q) = kh^(5/2) h = 웨어 수두, D = 밑면에서 절단 하부점까지 길이, B 수로의 폭 k = 81.2 + 0.24/0.25 + (8.4+12/(0.7)^(1/2))X(0.25/0.8-0.09)^2 = 83.3 Q = 83.3 X (0.25)^(5/2)= 2.6',calc:false},
  {id:133,subject:4,exam:'2021-08',text:'기체크로마토그래피에 사용되는 운반기체 중 분리도가 큰 순서대로 나타낸 것은?',choices:['N2 ＞ He ＞ H2','He ＞ H2 ＞ N2','N2 ＞ H2 ＞ He','H2 ＞ He ＞ N2'],answer:2,explain:'분자량이 작을수록 분리도가 높다 생물화학적 산소요구량 = ((D1-D2) - (B1-B2)*f)*P P(희석배수) = 300/5 = 60 ((7.6-4.0)-(7.6-7.0)*1)*60 = 180',calc:false},
  {id:134,subject:4,exam:'2021-08',text:'수질오염공정시험기준상 양극벗김전압전류법으로 측정하는 금속은?',choices:['구리','납','니켈','카드뮴'],answer:1,explain:'양극벗김전압전류법 : 수은, 아연, 납, 비소 측정가능 아세톤90%',calc:false},
  {id:135,subject:4,exam:'2021-08',text:'질산성 질소의 정량시험 방법 중 정량범위가 0.1mg NO3-N/L가 아닌 것은?',choices:['이온크로마토그래피법','자외선/가시선 분광법(부루신법)','자외선/가시선 분광법(활성탄흡착법)','데발다합금 환원증류법(분광법)'],answer:2,explain:'활성탄흡착법은 0.3mg/L',calc:false},
  {id:136,subject:4,exam:'2021-08',text:'전기전도도의 측정에 관한 설명으로 잘못된 것은?',choices:['온도차에 의한 영향은 ±5%/°C정도이며 측정결과값의 통일을 위하여 보정하여야 한다.','측정단위는 uS/cm로 한다.','전기전도도는 용액이 전류를 운반할 수 있는 정도를 말한다.','전기전도도 셀은 항상 수중에 잠긴 상태에서 보존하여야 하며, 정기적으로 점검한 후 사용한다.'],answer:2,explain:'편차 플러스마이너스 3% 이하 6가 크롬만 가능',calc:false},
  {id:137,subject:4,exam:'2021-08',text:'백분율(W/V, %)의 설명으로 옳은 것은?',choices:['용액 100g 중의 성분무게(g)를 표시','용액 100mL 중의 성분용량(mL)을 표시','용액 100mL 중의 성분무게(g)를 표시','용액 100g 중의 성분용량(mL)을 표시'],answer:2,explain:'3번이 정답입니다.',calc:false},
  {id:138,subject:4,exam:'2021-08',text:'수질측정기기 중에서 현장에서 즉시 측정하기 위한 것이 아닌 것은?',choices:['DO meter','pH meter','TOC meter','Thermometer'],answer:1,explain:'2m 미만이면 수심의 1/3만 2m 이상이면 수심의 1/3과 2/3에서 채수',calc:false},
  {id:139,subject:1,exam:'2021-05',text:'오염총량관리 기본방침에 포함되어야 하는 사항으로 거리가 먼 것은?',choices:['오염총량관리 대상지역의 수생태계 현황 조사 및 수생태계 건강성 평가 계획','오염원의 조사 및 오염부하량 산정방법','오염총량관리의 대상 수질오염물질 종류','오염총량관리의 목표'],answer:2,explain:'1. 오염총량관리의 목표 2. 오염총량관리의 대상 수질오염물질 종류 3. 오염원의 조사 및 오염부하량 산정방법 4. 오염총량관리기본계획의 주체, 내용, 방법 및 시한',calc:false},
  {id:140,subject:1,exam:'2021-05',text:'자당(sucrose, C12H22O11)이 완전히 산화될 때 이론적인 ThOD/TOC 비는?',choices:['2.67','3.83','4.43','5.68'],answer:3,explain:'C12H22O11 + 12O2 → 12CO2 +11H2O 따라서 ThOD/TOC = 12 * 32 / 12 * 12 =2.67 1925년에 Streeter and Phelps는 용존산소 “sag curve”에 관한 근본적인 연구를 발표하였다. 그들은 용존',calc:false},
  {id:141,subject:1,exam:'2021-05',text:'해양오염에 관한 설명으로 가장 거리가 먼 것은?',choices:['육지와 인접해 있는 대륙붕은 오염되기 쉽다.','유류오염은 산소의 전달을 억제한다.','원유가 바다에 유입되면 해면에 엷은 막을 형성하며 분산된다.','해수 중에서 오염물질의 확산은 일반적으로 수직방향이 수평방향보다 더 빠르게 진행된다.'],answer:3,explain:'수직방향으로는 중간에 수온약층이 있어 안정하기 대문에 수평방향으로의 확산이 더 빠릅니다.',calc:false},
  {id:142,subject:1,exam:'2021-05',text:'유기화합물이 무기화합물과 다른 점을 올바르게 설명한 것은?',choices:['유기화합물들은 대체로 이온반응보다는 분자반응을 하므로 반응속도가 느리다.','유기화합물들은 대체로 분자반응보다는 이온반응을 하므로 반응속도가 느리다.','유기화합물들은 대체로 이온반응보다는 분자반응을 하므로 반응속도가 빠르다.','유기화합물들은 대체로 분자반응보다는 이온반응을 하므로 반응속도가 빠르다.'],answer:0,explain:'유기화합물 → 분자반응 → 느린 반응속도 (유유자적~) 무기화합물 → 이온반응 → 빠른 반응속도 (무지 빠름!)',calc:false},
  {id:143,subject:1,exam:'2021-05',text:'약산인 0.01N-CH3COOH가 18%해리될 때 수용액의 pH는?',choices:['약 2.15','약 2.25','약 2.45','약 2.75'],answer:3,explain:'PH = -log[H+] 0.01*(CH3COOH <=> CH3COO-   +   H+) 18% 해리의 경우 0.01(1-0.18) CH3COO  <=> 0.01*0.18 CH3COO-    +   0.01*0.18 H+',calc:false},
  {id:144,subject:1,exam:'2021-05',text:'식물과 조류세포의 엽록체에서 광합성의 명반응과 암반응을 담당하는 곳은?',choices:['틸라코이드와 스트로마','스트로마와 그라나','그라나와 내막','내막과 외막'],answer:2,explain:'틸라코이드 - 명반응 스트로마   - 암반응 Carlson 지수는 1. 엽록소 a 농도(Chlorophyll-a)',calc:false},
  {id:145,subject:1,exam:'2021-05',text:'광합성의 영향인자와 가장 거리가 먼 것은?',choices:['빛의 강도','빛의 파장','온도','O2 농도'],answer:2,explain:'o2농도는 광합성후 생성 규조류에 대한 설명이다. 규조류는 봄, 가을에는 급성장을 보여 호수와 성층현상에 관련이 있고 단세포이며 드물게 군락을 이루고 있는 경우도 있다.',calc:false},
  {id:146,subject:1,exam:'2021-05',text:'물의 특성에 관한 설명으로 틀린 것은?',choices:['수소와 산소의 공유결합 및 수소결합으로 되어 있다.','수온이 감소하면 물의 점성도가 감소한다.','물의 점성도는 표준상태에서 대기의 대략 100배 정도이다.','물분자 사이의 수소결합으로 큰 표면장력을 갖는다.'],answer:1,explain:'물의 온도 증가 -> 물의 점성도 감소 -> 증발 반대로 수온이 내려가면 물의 점성도는 증가하게 됨.',calc:false},
  {id:147,subject:1,exam:'2021-05',text:'자연계 내에서 질소를 고정할 수 있는 생물과 가장 거리가 먼 것은?',choices:['Blue green algae','Rhizobium','Azotobacter','Flagellates'],answer:3,explain:'Flagellates : 편모충류 ln0.5=-2k k=ln0.5/-2 = 0.35 ln 5000/20=-0.35t',calc:false},
  {id:148,subject:1,exam:'2021-05',text:'보통 농업용수의 수질평가 시 SAR로 정의하는데 이에 대한 설명으로 틀린 것은?',choices:['SAR값이 20정도이면 Na+가 토양에 미치는 영향이 적다.','SAR의 값은 Na+, Ca2+, Mg+2 농도와 관계가 있다.','경수가 연수보다 토양에 더 좋은 영향을 미친다고 볼 수 있다.','SAR의 계산식에 사용되는 이온의 농도는 meq/L를 사용한다.'],answer:0,explain:'SAR값이 18~26이면 비교적 높다.',calc:false},
  {id:149,subject:1,exam:'2021-05',text:'분뇨에 관한 설명으로 옳지 않은 것은?',choices:['분뇨는 다량의 유기물과 대장균을 포함하고 있다.','도시하수에 비하여 고형물 함유도와 점도가 높다.','분과 뇨의 혼합비는 1:10이다.','분과 뇨의 고형물비는 약 1:1이다.'],answer:3,explain:'분과 뇨의 고형물비는 약 7:1이다. CH2(NH2)COOH + 1.5O2 = 2CO2 + NH3 + H2O NH3 + 2O2 = HNO3 + H2O 두 가지 반응식에 들어가는 O2 는 (1.5+2) * 3mol = 10.5mol O2',calc:false},
  {id:150,subject:1,exam:'2021-05',text:'해수에 관한 다음의 설명 중 옳은 것은?',choices:['해수의 중요한 화학적 성분 7가지는 Cl-, Na+, Mg2+, SO42-, HCO3-, K+, Ca2+이다.','염분은 적도해역에서 낮고 남북 양극해역에서 높다.','해수의 Mg/Ca비는 담수보다 작다.','해수의 밀도는 수심이 깊을수록 염농도가 감소함에 따라 작아진다.'],answer:0,explain:'2. 염분은 무역풍대 ＞ 적도해역 ＞ 극지방 3. 해수의 Mg/Ca비는 3~4로 담수보다 크다. 4. 해수의 밀도는 수심이 깊을수록 염농도가 증가함에 따라 커진다.',calc:false},
  {id:151,subject:2,exam:'2021-05',text:'아세트산(CH3COOH) 120mg/L 용액의 pH는? (단, 아세트산 Ka=1.8×10-5)',choices:['4.65','4.21','3.72','3.52'],answer:2,explain:'120mg=0.12g 0.12÷60= 0.002 x^2/0.002=1.8×10^-5 x=1.897×10^-4 -log(1.897×10^-4)=3.722',calc:true},
  {id:152,subject:2,exam:'2021-05',text:'상수시설 중 도수거에서의 최소유속(m/sec)은?',choices:['0.1','0.3','0.5','1.0'],answer:2,explain:'상수도 시설 도수거의 최소, 최대 유속은 0.3~3m/s 부대장치가 많음',calc:false},
  {id:153,subject:2,exam:'2021-05',text:'응집지(정수시설)내 급속혼화시설의 급속혼화방식과 가장 거리가 먼 것은?',choices:['공기식','수류식','기계식','펌프 확산에 의한 방법'],answer:0,explain:'급속 혼화방식 : 수류식, 기계식 및 펌프 확산에 의한 방법',calc:false},
  {id:154,subject:2,exam:'2021-05',text:'하수 고도처리를 위한 급속여과법에 관한 설명과 가장 거리가 먼 것은?',choices:['여층의 운동방식에 의해 고정상형 및 이동상형으로 나눌 수 있다.','여층의 구성은 유입수와 여과수의 수질, 역세척 주기 및 여과면적을 고려하여 정한다.','여과속도는 유입수와 여과수의 수질, SS의 포획능력 및 여과지속시간을 고려하여 정한다.','여재는 종류, 공극률, 비표면적, 균등계수 등을 고려하여 정한다.'],answer:1,explain:'하수 고도처리 급속여과법에서 여층의 구성은 여층의 형태에 따라 다르게 고려하며, 주로 모래, 안트라 사이트를 사용',calc:false},
  {id:155,subject:2,exam:'2021-05',text:'상수의 취수시설에 관한 설명 중 틀린 것은?',choices:['최수탑은 탑의 설치 위치에서 갈수 수심이 최소 2m이상이어야 한다.','취수보의 취수구의 유입 유속은 1m/sec이상이 표준이다.','취수탑의 취수구 단면형상은 장방형 또는 원형으로 한다.','취수문을 통한 유입속도가 0.8m/sec 이하가 되도록 취수문의 크기를 정한다.'],answer:1,explain:'취수구 유입유속 0.4 ~ 0.8 m/s',calc:false},
  {id:156,subject:2,exam:'2021-05',text:'상수처리시설인 침사지의 구조 기준으로 틀린 것은?',choices:['표면부하율은 200~500mm/min을 표준으로 한다.','지내 평균유속은 30cm/sec를 표준으로 한다.','지의 상단높이는 고수위보다 0.6~1m의 여유고를 둔다.','지의 유효수심은 3~4m를 표준으로 한다.'],answer:1,explain:'지내 평균유속은 2~7cm/sec를 표준으로 한다 매설깊이 5M',calc:false},
  {id:157,subject:2,exam:'2021-05',text:'계획오수량에 대한 설명 중 올바르지 않은 것은?',choices:['합류식에서 우천 시 계획오수량은 원칙적으로 계획시간최대오수량의 3배이상으로 한다.','계획1일최대오수량은 1인1일평균오수량에 계획인구를 곱한 후, 여기에 공장폐수량, 지하수량 및 기','계획1일평균오수량은 계획1일최대오수량의 70~80%를 표준으로 한다.','계획시간최대오수량은 계획1일 최대오수량의 1시간당 수량의 1.3~1.8배를 표준으로 한다.'],answer:3,explain:'계획1일최대오수량은 "1인1일최대오수량"에 계획인구를 곱한 후, 여기에 공장폐수량, 지하수량 및 기타 배수량을 더한 것으로 한다. x=73000(1+0.05)^20',calc:false},
  {id:158,subject:2,exam:'2021-05',text:'해수담수화를 위해 해수를 취수할 때 취수위치에 따른 장ㆍ단점으로 틀린 것은?',choices:['해중취수(10m 이상): 기상변화, 해조류의 영향이 적다.','해안취수(10m 이내): 계절별 수질, 수온 변화가 심하다.','염지하수 취수: 추가적 전처리 비용이 발생한다.','해안치수(10m 이내): 양적으로 가장 경제적이다.'],answer:2,explain:'염지하수는 취수후 추가적인 비용이 발생하지 않는다.',calc:false},
  {id:159,subject:2,exam:'2021-05',text:'펌프의 캐비테이션이 발생하는 것을 방지하기 위한 대책으로 볼 수 없는 것은?',choices:['펌프의 설치위치를 가능한 한 높게 하여 펌프의 필요유효흡입수두를 작게 한다.','펌프의 회전속도를 낮게 선정하여 펌프의 필요유효흡입수두를 작게 한다.','흡입관의 손실을 가능한 한 작게 하여 펌프의 가용유효흡입수두를 크게 한다.','흡입측 밸브를 완전히 개방하고 펌프를 운전한다.'],answer:1,explain:'공동현상 방지대책 - 펌프설치 위치는 낮게 필요유효 흡입수두는 작게 - 펌프 회전속도는 낮게 필요유효 흡입수두는 작게 - 흡인관 손실 가능한 작게 가용유효 흡입수는 크게',calc:false},
  {id:160,subject:2,exam:'2021-05',text:'오수관거를 계획할 때 고려할 사항으로 맞지 않는 것은?',choices:['분류식과 합류식이 공존하는 경우에는 원칙적으로 양 지역의 관거는 분리하여 계획한다.','관거는 원칙적으로 암거로 하며, 수밀한 구조로 하여야 한다.','관거단면, 형상 및 경사는 관거 내에 침전물이 퇴적하지 않도록 적당한 유속을 확보한다.','관거의 역사이펀이 발생하도록 계획한다.'],answer:3,explain:'관거의 역사이펀은 발생하지 않도록 한다',calc:false},
  {id:161,subject:2,exam:'2021-05',text:'펌프의 특성곡선에서 펌프의 양수량과 양정간의 관계를 가장 잘 나타낸 곡선은?',choices:['a 곡선','b 곡선','c 곡선','d 곡선'],answer:3,explain:'유달시간 t = 유입시간 + 유하시간, 유입시간 180 sec = 3min 유하시간 = 관거길이 1000m/(33m/min) = 30.3min, 총 유달시간 t = 33.3min 강우강도 I = 3970/33.3 + 31 mm/hr = 61.74mm/hr 면적 A 3.0km^2 = 300ha',calc:false},
  {id:162,subject:2,exam:'2021-05',text:'하수도계획 수립 시 포함되어야 하는 사항과 가장 거리가 먼 것은?',choices:['침수방지계획','슬러지 처리 및 자원화 계획','물관리 및 재이용계획','하수도 구축지역 계획'],answer:3,explain:'1. 침수방지계획 2. 슬러지 처리 및 자원화 계획 3, 물관리 및 재이용계획 4. 수질보전 계획',calc:false},
  {id:163,subject:2,exam:'2021-05',text:'정수시설인 완속여과지에 관한 내용으로 옳지 않은 것은?',choices:['주위벽 상단은 지반보다 60cm 이상 높여 여과지 내로 오염수나 토사 등의 유입을 방지한다.','여과속도는 4~5m/day를 표준으로 한다.','모래층의 두께는 70~90cm를 표준으로 한다.','여과면적은 계획정수량을 여과속도로 나누어 구한다.'],answer:3,explain:'급속여과 완속여과 비교 급속여과 여과속도 120~140m/day 완속여과 여과속도 4~5m/day 급속여과 모래층 두께 60~70cm(최대 120cm)',calc:false},
  {id:164,subject:2,exam:'2021-05',text:'하수시설인 중력식침사지에 대한 설명 중 옳은 것은?',choices:['체류시간은 3~6분을 표준으로 한다.','수심은 유효수심에 모래퇴적부의 깊이를 더한 것으로 한다.','오수침사지의 표면부하율은 3600m3/m2-day정도로 한다.','우수침사지의 표면부하율은 1800m3/m2-day정도로 한다.'],answer:1,explain:'1. 중력식 침사지 체류시간 30~60초',calc:false},
  {id:165,subject:3,exam:'2021-05',text:'펌프를 선정할 때 고려 사항으로 적당하지 않은 것은?',choices:['펌프를 최대효율점 부근에서 운전하도록 용량 및 대수를 결정한다.','펌프의 설치대수는 유지관리상 가능한 적게하고 동일용량의 것으로 한다.','펌프는 저용량일수록 효율이 높으므로 가능한 저용량으로 한다.','내부에서 막힘이 없고, 부식 및 마모가 적어야 한다.'],answer:3,explain:'펌프는 고용량일수록 효율이 높고 가능한 고용량으로 한다. (1) 물에 대한 부피를 구함 (2) 조내 기포의 갯수 * 기포의 표면적 * 기포의 체류시간 곱 (2)/(1) 을 하면 됨',calc:false},
  {id:166,subject:3,exam:'2021-05',text:'다음 조건과 같이 혐기성 반응을 시킬 때 세포생산량(kg 세포/day)은?',choices:['84','182','215','334'],answer:2,explain:'먼저 1/SRT 공식을 이용해 X x V 구한후 그냥 XrQw 구하면 되네요',calc:true},
  {id:167,subject:3,exam:'2021-05',text:'응집과정 중 교반의 영향에 관한 설명으로 알맞지 않은 것은?',choices:['교반에 따른 응집효과는 입자의 농도가 높을수록 좋다.','교반에 따른 응집효과는 입자의 지름이 불균일할수록 좋다.','교반을 위한 동력은 응결지 부피와 비례한다.','교반을 위한 동력은 속도경사와 반비례한다.'],answer:2,explain:'동력은 속도경사의 제곱에 비례한다 0.63*4000(200-180)-0.05*1000*3000*0.75=341,100 341,100/1000=341.1 직경 3.2mm → 3.2*10^-3m',calc:false},
  {id:168,subject:3,exam:'2021-05',text:'생물학적 폐수처리공정에서 생물 반응조에 슬러지를 반송시키는 주된 이유는?',choices:['폐수처리에 필요한 미생물을 공급하기 위하여','폐수에 들어있는 독성물질을 중화시키기 위하여','활성슬러지가 자라는데 필요한 영양소를 공급하기 위하여','슬러지처리공정으로 들어가는 잉여슬러지의 양을 증가시키기 위하여'],answer:0,explain:'1번이 정답입니다.',calc:false},
  {id:169,subject:3,exam:'2021-05',text:'연속회분식(SBR)의 운전단계에 관한 설명으로 틀린 것은?',choices:['주입: 주입단계 운전의 목적은 기질(원폐수 또는 1차 유출수)을 반응조에 주입하는 것이다.','주입: 주입단계는 총 cycle 시간의 약 25% 정도이다.','반응: 반응단계는 총 cycle 시간의 약 65% 정도이다.','침전: 연속흐름식 공정에 비하여 일반적으로 더 효율적이다.'],answer:2,explain:'주입 : 25% 반응 : 35% 침전 : 20% 배출 : 15%',calc:false},
  {id:170,subject:3,exam:'2021-05',text:'혐기성 소화조내의 pH가 낮아지는 원인이 아닌 것은?',choices:['유기물 과부하','과도한 교반','중금속 등 유해물질 유입','온도 저하'],answer:3,explain:'pH가 낮아지는 원인 1. 유기물 과부하 2. 중금속 등 유해물질 유입 3. 온도 저하 4. 교반 부족 시안을 함유한 폐수는 염소법, 오존산화법, 감청법(시안착염), 전해산화법, 전기투석법 등으로 처리할 수 있습니다.',calc:false},
  {id:171,subject:4,exam:'2021-05',text:'상향류 혐기성 슬러지상(UASB)에 관한 설명으로 틀린 것은?',choices:['미생물 부착을 위한 여재를 이용하여 혐기성 미생물을 슬러지층으로 축적시켜 폐수를 처리하는 방식','수리학적 체류시간을 작게 할 수 있어 반응조 용량이 축소된다.','폐수의 성상에 의하여 슬러지의 입상화가 크게 영향을 받는다.','고형물의 농도가 높을 경우 고형물 및 미생물이 유실될 우려가 있다.'],answer:0,explain:'상향류 혐기성 슬러지상(UASB)의 특징 1. 기계적인 교반이나 여재가 필요없기 때문에 비용이 적게 든다. 2. 수리학적 체류시간을 작게 할 수 있어 반응조 용량이 축소된다. 3. 미생물 체류시간을 적절히 조절하면 저농도 유기성 폐수의 처리도 가능하다.',calc:false},
  {id:172,subject:4,exam:'2021-05',text:'자외선/가기선 흡광광도계의 구성 순서로 가장 적합한 것은?',choices:['광원부 – 파장선택부 – 시료부 - 측광부','광원부 – 파장선택부 – 단색화부 - 측광부','시료도입부 – 광원부 – 파장선택부 - 측광부','시료도입부 – 광원부 – 검출부 – 측광부'],answer:0,explain:'1번이 정답입니다.',calc:false},
  {id:173,subject:4,exam:'2021-05',text:'부유물질 측정 시 간섭물질에 관한 설명으로 틀린 것은?',choices:['증발잔류물이 1000mg/L 이상인 경우의 해수, 공장폐수 등은 특별히 취급하지 않을 경우, 높은 부유','5mm금속망을 통과시킨 큰 입자들은 부유 물질 측정에 방해를 주지 않는다.','철 또는 칼슘이 높은 시료는 금속침전이 발생하며 부유물질 측정에 영향을 줄 수 있다.','유지 및 혼합되지 않는 유기물도 여과지에 남아 부유물질 측정값을 높게 할 수 있다.'],answer:1,explain:'1. 증발잔류물이 1000mg/l 이상인 경우의 해수,공장폐수 등은 특별히 취급하지 않을 경우 높은 부유물질 값을 나타낼 수 있다. 이 경우 여과지를 여러번 세척한다 2. 나무조각, 큰 모래입자 등과 같은  큰 입자들은 부유물질 측정에 방해를 주며 이 경우 2mm금속망에 먼 저 통과시킨후 분석을 측정한다',calc:false},
  {id:174,subject:4,exam:'2021-05',text:'수질분석용 시료 채취 시 유의사항과 가장 거리가 먼 것은?',choices:['시료 채취 용기는 시료를 채우기 전에 깨끗한 물로 3회 이상 씻은 다음 사용한다.','유류 또는 부유물질 등이 함유된 시료는 시료의 균일성이 유지될 수 있도록 채취하여야 하며 침전물','용존가스, 환원성 물질, 휘발성유기화합물, 냄새, 유류 및 수소이온 등을 측정하는 시료는 시료용기','시료 채취량은 보통 3~5L 정도이어야 한다.'],answer:2,explain:'물 → 시료로 3회이상 1) ELCD : 전해질 전도도 검출기 - electrolytic conductivity detector 2) ECD : 전자 포착 검출기',calc:false},
  {id:175,subject:4,exam:'2021-05',text:'시료 보존 시 반드시 유리병을 사용하여야 하는 측정 항목이 아닌 것은?',choices:['노말핵산추출물질','음이온계면활성제','유기인','PCB'],answer:1,explain:'폴리에틸렌만 가능: 불소 유리병만: 노말핵산추출물질, 유기인, PCB, 페놀, 휘발성 유기화합물, 냄새, 물벼룩 갈색병만: 염화비닐, 다이옥신, 석유계 총탄화수소, 잔류염소, 다이에틸헥실프랄레이트 위에 적히지 않은 \'음이온계면활성제(ABS)는 폴리에틸렌, 유리병 사용 가능하므로 답은 2번입니다.',calc:false},
  {id:176,subject:4,exam:'2021-05',text:'노말헥산 추출물질의 정량한계(mg/L)는?',choices:['0.1','0.5','1.0','5.0'],answer:0,explain:'세즈윅-라프터 챔버는 조작이 편리하고 재현성이 높은 반면, 증배율이상에서는 관찰이 어렵기 때문에 미 소 플랑크톤의 검경에는 적절하지 못하다',calc:true},
  {id:177,subject:4,exam:'2021-05',text:'수질오염공정시험기준상 음이온 계면활성제 실험방법으로 옳은 것은?',choices:['자외선/가시선 분광법','원자흡수분광광도법','기체크로마토그래피법','이온전극법'],answer:0,explain:'음이온 계면활성제(흡광도 650nm)- 자외선/ 가시선 분광법 (정량한계 : 0.02) - 연속흐름법 (정량한계 : 0.09)',calc:false},
  {id:178,subject:4,exam:'2021-05',text:'공정시험기준의 내용으로 가장 거리가 먼 것은?',choices:['온수는 60~70℃, 냉수는 15℃이하를 말한다.','방울수는 20℃에서 정제수 20방울을 적하할 때, 그 부피가 약 1mL가 되는 것을 뜻한다.','‘정밀히 단다’라 함은 규정된 수치의 무게를 0.1mg까지 다는 것을 말한다.','시험에 쓰는 물은 따로 규정이 없는 한 증류수 또는 정제수로 한다.'],answer:2,explain:'정밀히 단다: 규정된 양의 시료를 취하여 화학저울 또는 미량저울로 칭량함을 말한다. 정확히 단다: 규정된 수치의 무게를 0.1mg까지 다는 것을 말한다.',calc:false},
  {id:179,subject:4,exam:'2021-05',text:'자외선/가시선 분광법을 적용한 크롬 측정에 관한 내용으로 ( )에 옳은 것은?',choices:['㉠ 과망간산칼륨, ㉡ 황색','㉠ 과망간산칼륨, ㉡ 적자색','㉠ 티오황산나트륨, ㉡ 적색','㉠ 티오황산나트륨, ㉡ 황갈색'],answer:1,explain:'Q=k(h)^(5/2) FeSO4 용액의 농도를 계산하면, NV = N’V’ (? N) (25 mL) = (0.1 N) (31.25 mL)',calc:false},
  {id:180,subject:4,exam:'2021-05',text:'시료의 최대보존기간이 다른 측정 항목은?',choices:['시안','불소','염소이온','노말헥산추출물질'],answer:1,explain:'시안은 14일 나머지 불소, 염소이온, 노말핵산추출물은 28일',calc:false},
  {id:181,subject:1,exam:'2021-03',text:'중권역 물환경관리계획에 관한 내용으로 ( )의 내용으로 옳은 것은?',choices:['㉠ 관계 시ㆍ도지사, ㉡ 지방환경관서의 장','㉠ 지방환경관서의 장, ㉡ 관계 시ㆍ도지사','㉠ 유역환경청장, ㉡ 지방환경관서의 장','㉠ 지방환경관서의 장, ㉡ 유역환경청장'],answer:0,explain:'1. 유역환경의 조사, 분석 자료 2. 오염원의 자연증감에 관한 분석 자료 3. 지역개발에 관한 과거와 장래의 계획에 관한 자료 4. 오염부하량의 산정에 사용한 자료',calc:false},
  {id:182,subject:1,exam:'2021-03',text:'미생물 중 세균(Bacteria)에 관한 특징으로 가장 거리가 먼 것은?',choices:['원시적 엽록소를 이용하여 부분적인 탄소동화작용을 한다.','용해된 유기물을 섭취하며 주로 세포분열로 번식한다.','수분 80%, 고형물 20% 정도로 세포가 구성되며 고형물 중 유기물이 90%를 차지한다.','pH, 온도에 대하여 민감하며, 열보다 낮은 온도에서 저항성이 높다.'],answer:0,explain:'박테리아는 탄소동화작용을 하지 않고 유기탄소를 섭취하는 종속영양계이다.',calc:false},
  {id:183,subject:1,exam:'2021-03',text:'하천 수질모델 중 WQRRS에 관한 설명으로 가장 거리가 먼 것은?',choices:['하천 및 호수의 부영양화를 고려한 생태계 모델이다.','유속, 수림, 조도계수에 의해 확산계수를 결정한다.','호수에는 수심별 1차원 모델이 적용된다.','정적 및 동적인 하천의 수질, 수문학적 특성이 광범위하게 고려된다.'],answer:3,explain:'2번은 QUAL-1의 내용임 SAR은 Na+,Mg2+,Ca2+와 관련있다.',calc:false},
  {id:184,subject:1,exam:'2021-03',text:'다음이 설명하는 일반적 기체 법칙은?',choices:['라울트의 법칙','게이-루삭의 법칙','헨리의 법칙','그레함의 법칙'],answer:0,explain:'Raoult law: PA=yA*P=xA*PA(SAT)',calc:false},
  {id:185,subject:1,exam:'2021-03',text:'우리나라의 수자원 이용현황 중 가장 많은 용도로 사용하는 용수는?',choices:['생활용수','공업용수','농업용수','유지용수'],answer:3,explain:'농업 > 유지 > 생활 > 공업 X/M=K×C^1/n 10-1/M=0.5×1^1/2 ∴M=18',calc:false},
  {id:186,subject:1,exam:'2021-03',text:'원생동물(Protozoa)의 종류에 관한 내용으로 옳은 것은?',choices:['Paramecia는 자유롭게 수영하면서 고형물질을 섭취한다.','Vorticella는 불량한 활성슬러지에서 주로 발견된다.','Sarcodina는 나팔의 입에서 물흐름을 일으켜 고형물질만 걸러서 먹는다.','Suctoria는 몸통으로 움직이면서 위족으로 고형물질을 몸으로 싸서 먹는다.'],answer:0,explain:'3번은 stalked ciliates에 대한 내용 4번은 sarcodina에 대한 내용 suctoria는 입이 없고 분생 또는 아생에 의해 번식. 관같이 생긴 축수로 양분 섭취',calc:false},
  {id:187,subject:1,exam:'2021-03',text:'다음 설명과 가장 관계있는 것은?',choices:['박테리아','균류','조류','원생동물'],answer:1,explain:'2번이 정답입니다.',calc:false},
  {id:188,subject:1,exam:'2021-03',text:'산과 염기의 정의에 관한 설명으로 옳지 않은 것은?',choices:['Arrhenius는 수용액에서 수산화이온을 내어 놓는 물질을 염기라고 정의하였다.','Lewis는 전자쌍을 받는 화학종을 염기라고 정의하였다.','Arrhenius는 수용액에서 양성자를 내어 놓은 것을 산이라고 정의하였다.','Brӧnsted-Lowry는 수용액에서 양성자를 내어주는 물질을 산이라고 정의하였다.'],answer:2,explain:'Lewis는 전자쌍을 "받는(X) / 주는(O)" 화학종을 염기라고 정의 Lewis는 전자쌍을 받는 화학종을 "염기(X) / 산(O)" 이라고 정의 15000g * 0.082 L*atm/mol*K * (273+25)K / 4atm * 1mol/16g *1m3/1000L = 5.727 m3 C6H12O6⇔3CO2+3CH4',calc:false},
  {id:189,subject:1,exam:'2021-03',text:'유기화합물에 대한 설명으로 옳지 않은 것은?',choices:['유기화합물들은 일반적으로 녹는 점과 끓는 점이 낮다.','유기화합물들은 하나이 분자식에 대하여 여러 종류의 화합물이 존재할 수 있다.','유기화합물들은 대체로 이온 반응보다는 분자반응을 하므로 반응속도가 빠르다.','대부분의 유기화합물은 박테리아의 먹이가 될 수 있다.'],answer:3,explain:'3. 유기화합물은 대체로 이온 반응보다는 분자반응을 하므로 반응속도가 느리다. 무기물=물과 친하지 않음 서스펜션,에멀션은 콜로이드의 상태이고 친수성 콜로이드는 물과 친한 콜로이드 이므로',calc:false},
  {id:190,subject:1,exam:'2021-03',text:'열수 배출에 의한 피해현상으로 가장 거리가 먼 것은?',choices:['발암물질 생성','부영양화','용존산소의 감소','어류의 폐사'],answer:3,explain:'열수에는 용해된 미네랄이 풍부하여 부영양화 발생하게 된다. 비(소)피(부)더스 먹으면 흑(피증)색 똥나온다로 외우세요! 비소 - 피부점막, 피부염, 흑피증 2000 * 0.15 =300mg/L',calc:false},
  {id:191,subject:1,exam:'2021-03',text:'수은주 높이 150mm는 수주로 몇 mm인가?',choices:['약 2040','약 2530','약 3240','약 3530'],answer:0,explain:'150mmHg x (10332.275mmH2O / 1atm) x ( 1atm / 760mmHg ) = 2039.26mmH2O Kt = K20 X 1.047^(t-20) k25 = 0.19 x 1.047^(25-20)=0.24 1. 수괴의 수직운동으로 수질은 악화되지만 전체 자정작용은 촉진',calc:true},
  {id:192,subject:2,exam:'2021-03',text:'적조 현상에 관한 설명으로 틀린 것은?',choices:['수괴의 연직안정도가 작을 때 발생한다.','강우에 따른 하천수의 유입으로 해수의 염분량이 낮아지고 영양염류가 보급될 때 발생한다.','적조조류에 의한 아가미 폐색과 어류의 호흡장애가 발생한다.','수중 용존산소 감소에 의한 어패류의 폐사가 발생한다.'],answer:2,explain:'1. 수괴의 연직안정도가 클 때 발생한다. Q=1/360*C*I*A t=t1+t2=6min(t2=600m/(1m/sec)=600sec=10min) I=118.0645mm/hr',calc:false},
  {id:193,subject:2,exam:'2021-03',text:'우수배제계획의 수립 중 우수유출량의 억제에 대한 계획으로 옳지 않은 것은?',choices:['우수유출량의 억제방법은 크게 우수저류형, 우수침투형 및 토지이용의 계획적관리로 나눌 수 있다.','우수저류형 시설 중 On-site 시설은 단지 내 저류, 우수조정지, 우수체수지 등이 있다.','우수침투형은 우수를 지중에 침투시키므로 유수유출총량을 감소시키는 효과를 발휘한다.','우수저류형은 우수유출총량은 변하지 않으나 첨두유출량을 감소시키는 효과가 있다.'],answer:1,explain:'우수조정지, 우수체수지는 offsite시설임',calc:false},
  {id:194,subject:2,exam:'2021-03',text:'수원에 관한 설명으로 틀린 것은?',choices:['복류수는 대체로 수질이 양호하며 대개의 경우 침전지를 생략하는 경우도 있다.','용천수는 지하수가 종종 자연적으로 지표에 나타난 것으로 그 성질은 대개 지표수와 비슷하다.','우리나라의 일반적인 하천수는 연수인 경우가 많으므로 침전과 여과에 의하여 용이하게 정화되는 경','호소수는 하천의 유수보다 자정작용이 큰 것이 특징이다.'],answer:1,explain:'용천수 : 지표수가 지하로 침투하여 암석 또는 점토와 같은 불투수층에 차단되어 지표로 솟아나온 것으로, 유기성 및 무기성 불순물의 함유도가 낮고, 세균도 매우 작다.',calc:false},
  {id:195,subject:2,exam:'2021-03',text:'하수처리공법 중 접촉산화법에 대한 설명으로 틀린 것은?',choices:['반송슬러지가 필요하지 않으므로 운전관리가 용이하다.','생물상이 다양하여 처리효과가 안정적이다.','부착생물량의 임의 조정이 어려워 조작조건 변경에 대응하기 쉽지 않다.','접촉제가 조 내에 있기 때문에 부착생물량의 확인 어렵다.'],answer:0,explain:'3. 부착 생물량을 임의로 조정할 수 있어 조작조건의 변경에 대응이 쉬움 펌프장시설의 계획하수량 분류식 중계펌프장, 소규모펀프장, 유입-방류펌프장 : 계획시간최대오수량',calc:false},
  {id:196,subject:2,exam:'2021-03',text:'계획오수량에 관한 설명으로 틀린 것은?',choices:['지하수량은 1인1일최대오수량의 10~20%로 한다.','계획시간최대오수량은 계획1일 최대오수량의 1시간당 수량의 1.3~1.8배를 표준으로 한다.','합류식에서 우천 시 계획오수량은 원칙적으로 계획시간최대오수량의 3배 이상으로 한다.','계획1일평균오수량은 계획1일최대오수량의 50~60%를 표준으로 한다.'],answer:1,explain:'4번은 확실히 틀렸고 1번은 10~20%면 20% 이하라고 할 수 있어 옳다고 볼 수 있습니다 I=h/L, h=I*L 2/1000*1200m',calc:false},
  {id:197,subject:2,exam:'2021-03',text:'비교회전도(Ns)에 대한 설명 중 틀린 것은?',choices:['펌프의 규정 회전수가 증가하면 비교회전도도 증가한다.','펌프의 규정양정이 증가하면 비교회전도는 감소한다.','일반적으로 비교회전도가 크면 유량이 많은 저양정의 펌프가 된다.','비교회전도가 크게 될수록 흡입성능이 좋아지고 공동현상 발생이 줄어든다.'],answer:3,explain:'4. 비교회전도가 크게 될수록 흡입성능이 나쁘고 공동현상이 발생하기 쉽다.',calc:false},
  {id:198,subject:2,exam:'2021-03',text:'상수처리를 위한 약품침전지의 구성과 구조로 틀린 것은?',choices:['슬러지의 퇴적심도로서 30cm 이상을 고려한다.','유효수심은 3~5.5m로 한다.','침전지 바닥에는 슬러지 배제에 편리하도록 배수구를 향하여 경사지게 한다.','고수위에서 침전지 벽체 상단까지의 여유고는 10cm 정도로 한다.'],answer:3,explain:'4. 고수위에서 침전지 벽체 상단까지의 여유고는 30cm이상으로 한다.',calc:false},
  {id:199,subject:2,exam:'2021-03',text:'상수도 급수배관에 관한 설명으로 틀린 것은?',choices:['급수관을 공공도로에 부설할 경우에는 도로 관리자가 정한 점용위치와 깊이에 따라 배관해야 하며','급수관을 부설하고 되메우기를 할 때에는 양질토 또는 모래를 사용하여 적절하게 다짐하여 관을 보','급수관이 개거를 횡단하는 경우에는 가능한 한 개거의 위로 부설한다.','동결이나 결로의 우려가 있는 급수설비의 노출부분에 대해서는 적절한 방한조치나 결로방지조치를'],answer:2,explain:'3. 급수관이 개거를 횡단하는 경우에는 가능한 한 개거의 아래로 부설한다.',calc:false},
  {id:200,subject:2,exam:'2021-03',text:'하수처리시설의 계획유입수질 산정방식으로 옳은 것은?',choices:['계획오염부하량을 계획1일평균오수량으로 나누어 산정한다.','계획오염부하량을 계획시간평균오수량으로 나누어 산정한다.','계획오염부하량을 계획1일최대오수량으로 나누어 산정한다.','계획오염부하량을 계획시간최대오수량으로 나누어 산정한다.'],answer:0,explain:'1번이 정답입니다.',calc:false},
  {id:201,subject:2,exam:'2021-03',text:'하수시설에서 우수조정지 구조형식이 아닌 것은?',choices:['댐식(제방높이 15m 미만)','저하식(관내 저류 포함)','굴착식','유하식(자연 호소포함)'],answer:3,explain:'우수조정지의 구조형식 지하식, 굴착식, 댐식(제방높이 15m 미만)',calc:false},
  {id:202,subject:2,exam:'2021-03',text:'하수관로 개·보수계획 수립 시 포함되어야 할 사항이 아닌 것은?',choices:['불명수량 조사','개·보수 우선순위의 결정','개·보수공사 범위의 설정','주변 인근 신설관로 현황 조사'],answer:2,explain:'하수관로의 개,보수 계획은 관로의 중요도, 계획의 시급성, 환경성 및 기존관로 현황 등을 고려하여 수립 하되 다음과 같은 사항을 포함한다. -기초자료 분석 및 조사우선순위 결정 -불명수량 조사',calc:false},
  {id:203,subject:2,exam:'2021-03',text:'집수정에서 가정까지의 급수계통을 순서적으로 나열한 것으로 옳은 것은?',choices:['취수 → 도수 → 정수 → 송수 → 배수 →급수','취수 → 도수 → 정수 → 배수 → 송수 →급수','취수 → 송수 → 도수 → 정수 → 배수 →급수','취수 → 송수 → 배수 → 정수 → 도수 →급수'],answer:0,explain:'취수 - 도수 - 정수 - 송수 - 배수 - 급수 암기법 - 상(상수도)치(취수)도(도수) 청(정수)송(송수)에 배(배수)급(급수)한다.',calc:false},
  {id:204,subject:2,exam:'2021-03',text:'표준활성슬러지법에 관한 설명으로 잘못된 것은?',choices:['수리학적체류시간(HRT)은 6~8시간을 표준으로 한다.','수리학적체류시간(HRT)은 계획하수량에 따라 결정하며, 반송슬러지량을 고려한다.','MLSS농도는 1500~2500mg/L를 표준으로 한다.','MLSS농도가 너무 높으면 필요산소량이 증가하거나 이차침전지의 침전효율이 악화될 우려가 있다.'],answer:1,explain:'표준활성슬러지공법 설계인자 F/M비 : 0.2~0.4kg BOD5 / kg MLVSS day MLSS : 1500~200 mg/L HRT : 6~8hr',calc:false},
  {id:205,subject:2,exam:'2021-03',text:'계획취수량을 확보하기 위하여 필요한 저수용량의 결정에 사용하는 계획 기준년은?',choices:['원칙적으로 5개년에 제1위 정도의 갈수를 표준으로 한다.','원칙적으로 7개년에 제1위 정도의 갈수를 표준으로 한다.','원칙적으로 10개년에 제1위 정도의 갈수를 표준으로 한다.','원칙적으로 15개년에 제1위 정도의 갈수를 표준으로 한다.'],answer:2,explain:'3번이 정답입니다.',calc:false},
  {id:206,subject:2,exam:'2021-03',text:'상수의 소독(살균)설비 중 저장설비에 관한 내용으로 ( )에 가장 적합한 것은?',choices:['5일분','10일분','15일분','30일분'],answer:1,explain:'액화염소 저장량 → 1일 사용량 10일 이상',calc:false},
  {id:207,subject:3,exam:'2021-03',text:'상수도 시설 중 완속여과지의 여과속도 표준 범위는?',choices:['4~5 m/day','5~15 m/day','15~25 m/day','25~50 m/day'],answer:0,explain:'급속여과 120~150m/day, 완속여과 4~5m/day 20 * 3.14 * 16^2 / 4 = x *3.14 * 80^2 / 4 SDI=100/SVI SVI=(SV(%)×104)/MLSS(mg/L)',calc:false},
  {id:208,subject:3,exam:'2021-03',text:'질산화 반응에 의한 알칼리도의 변화는?',choices:['감소한다.','증가한다.','변화하지 않는다.','증가 후 감소한다.'],answer:0,explain:'질산화 반응이 진행되면 알칼리도가 소모되어  pH가 낮아짐',calc:false},
  {id:209,subject:3,exam:'2021-03',text:'하수처리를 위한 회전 원판법에 관한 설명으로 틀린 것은?',choices:['질산화가 일어나기 쉬우며 pH가 저하되는 경우가 있다.','원판의 회전으로 인해 부착생물과 회전판 사이에 전단력이 생긴다.','살수여상과 같이 여상에 파리는 발생하지 않으나 하루살이가 발생하는 수가 있다.','활성슬러지법에 비해 이차침전지 SS 유출이 적어 처리수의 투명도가 좋다.'],answer:2,explain:'활성슬러지법에 비해 이차침전지에서 미세한 SS가 유출되기 쉽고 처리수의 투명도고 나쁘다 Q/A=H/t 4m/2.4hr*24hr/day',calc:false},
  {id:210,subject:3,exam:'2021-03',text:'반송슬러지의 탈인 제거 공정에 관한 설명으로 틀린 것은?',choices:['탈인조 상징액은 유입수량에 비하여 매우 작다.','인을 침전시키기 위해 소요되는 석회의 양은 순수 화학처리방법보다 적다.','유입수의 유기물 부하에 따른 영향이 크다.','대표적인 인 제거공법으로는 phostrip process가 있다.'],answer:2,explain:'유입수의 유기물 부하에 따른 영향이 적다',calc:false},
  {id:211,subject:3,exam:'2021-03',text:'다음에서 설명하는 분리방법으로 가장 적합한 것은?',choices:['역삼투','한외여과','정밀여과','투석'],answer:2,explain:'초순수나 무균수 같은 거 만들려면 정밀하게 여과해야겠죠? NH3%=1/(1+(Kb/OH))식을 이용해 풀이',calc:false},
  {id:212,subject:3,exam:'2021-03',text:'폐수의 고도처리에 관한 다음의 기술 중 옳지 않은 것은?',choices:['CI-, SO42- 등의 무기염류의 제거에는 전기투석법이 이용된다.','활성탄 흡착법에서 폐수 중의 인산은 제거되지 않는다.','모래여과법은 고도처리 중에서 흡착법이나 전기투석법의 전처리로써 이용된다.','폐수 중의 무기성질소 화합물은 철염에 의한 응집침전으로 완전히 제거된다.'],answer:2,explain:'질소는 침전제거하지 않는다. P=G^2*µ*V V=Q*T 18480*30*1/86400(Sec->Day로 환산) = 6.41m^3/day G=속도 구배',calc:false},
  {id:213,subject:3,exam:'2021-03',text:'하수로부터 인 제거를 위한 화학제의 선택에 영향을 미치는 인자가 아닌 것은?',choices:['유입수의 인 농도','슬러지 처리시설','알칼리도','다른 처리공정과의 차별성'],answer:1,explain:'다른 처리공정과의 호환성 V=(Ci-C)Q/KC t=(Ci-C)/KC (100-10)/(0.35×10)=25.714',calc:false},
  {id:214,subject:3,exam:'2021-03',text:'수질 성분이 부식에 미치는 영향으로 틀린 것은?',choices:['높은 알칼리도는 구리와 납의 부식을 증가시킨다.','암모니아는 착화물 형성을 통해 구리, 납 등의 금속용해도를 증가시킬 수 있다.','잔류염소는 Ca와 반응하여 금속의 부식을 감소시킨다.','구리는 갈바닉 전지를 이룬 배관상에 흠집(구멍)을 야기한다.'],answer:2,explain:'잔류염소는 용존산소와 반응하여 금속의 부식을 증가시킨다.',calc:false},
  {id:215,subject:3,exam:'2021-03',text:'Freundlich 등은 흡착식(X/M=KCe1/n)에 대한 설명으로 틀린 것은?',choices:['X는 흡착된 용질의 양을 나타낸다.','K, n은 상수값으로 평행농도에 적용한 단위에 상관없이 동일하다.','Ce는 용질의 평형농도(질량/체적)를 나타낸다.','한정된 범위의 용질농도에 대한 흡착 평형값을 나타낸다.'],answer:0,explain:'K와 1/n는 Freundlich 상수로, 흡착제와 흡착질의 특성에 따라 달라집니다. 호기조 - 질산화 및 인의 과잉 흡수 무산소조 - 탈질수 혐기조 - 인의 용출',calc:false},
  {id:216,subject:4,exam:'2021-03',text:'호기성 미생물에 의하여 발생되는 반응은?',choices:['포도당 → 알코올','초산 → 메탄','아질산염 → 질산염','포도당 → 초산'],answer:2,explain:'질산화 과정중 호기성 미생물 니트로박터가 아질산성 질소에서 질산성질소로',calc:false},
  {id:217,subject:4,exam:'2021-03',text:'측정 항목과 측정 방법에 관한 설명으로 옳지 않은 것은?',choices:['불소 : 란탄-알리자린 콤프렉손에 의한 착화합물의 흡광도를 측정한다.','시안 : pH 12~13의 알칼리성에서 시안이온전극과 비교전극을 사용하여 전위를 측정한다.','크롬 : 산성용액에서 다이페닐카바자이드와 반응하여 생성하는 착화합물의 흡광도를 측정한다.','망간 : 황산산성에서 과황산칼륨으로 산화하여 생성된 과망간산 이온의 흡광도를 측정한다.'],answer:2,explain:'황산산성에서 과요오드산칼륨으로 산화하여 생성된 과망간산 이온의 흡광도를 측정한다 0.005 mol/L * 0.4L * 158g/1mol = 0.316g cf) 수심 0.4m 미만일 때 Vm=V0.6',calc:false},
  {id:218,subject:4,exam:'2021-03',text:'용해성 망간을 측정하기 위해 시료를 채취 후 속히 여과해야 하는 이유는?',choices:['망간을 공침시킬 우려가 있는 현탁물질을 제거하기 위해','망간 이온을 접촉적으로 산화, 침전시킬 우려가 있는 이산화망간을 제거하기 위해','용존상태에서 존재하는 망간과 침전상태에서 존재하는 망간을 분리하기 위해','단시간 내에 석출, 침전할 우려가 있는 콜로이드 상태의 망간을 제거하기 위해'],answer:0,explain:'1번이 정답입니다.',calc:false},
  {id:219,subject:4,exam:'2021-03',text:'대장균(효소이용정량법) 측정에 관한 내용으로 ( )에 옳은 것은?',choices:['자외선','적외선','가시선','기전력'],answer:0,explain:'F=비적정시약/적정시약 =10/10.15 =0.9852 항량 = 1시간 , g당 0.3mg',calc:false},
  {id:220,subject:4,exam:'2021-03',text:'수질연속자동측정기기의 설치방법 중 시료 채취지점에 관한 내용으로 ( )에 옳은 것은?',choices:['5','15','25','35'],answer:2,explain:'[200mg/L * x (mL)]/[300 mL] = 4 mg/L x=6 mL',calc:false},
  {id:221,subject:4,exam:'2021-03',text:'기체크로마토그래프 검출기에 관한 설명으로 틀린 것은?',choices:['열전도도검출기는 금속 필라멘트 또는 전기저항체를 검출소자로 한다.','수소염이온화검출기의 본체는 수소연소노즐, 이온수집기, 대극, 배기구로 구성된다.','알칼리열이온화검출기는 함유할로겐화합물 및 함유황화물을 고감도로 검출할 수 있다.','전자포획형검출기는 많은 니트로화합물, 유기금속화합물 등을 선택적으로 검출할 수 있다.'],answer:2,explain:'알칼리 열이온화 검출기는 유기질소 화합물 및 유기인 화합물을 검출할수있다.',calc:false},
  {id:222,subject:4,exam:'2021-03',text:'하천유량 측정을 위한 유속 면적법의 적용범위로 틀린 것은?',choices:['대규모 하천을 제외하고 가능하면 도섭으로 측정할 수 있는 지점','교량 등 구조물 근처에서 측정할 경우 교량의 상류지점','합류나 분류되는 지점','선정된 유량측정 지점에서 말뚝을 박아 동일 단면에서 유량측정을 수행할 수 있는 지점'],answer:2,explain:'합류나 분류가  없는 지점',calc:false},
  {id:223,subject:4,exam:'2021-03',text:'이온크로마토그래피에 관한 설명 중 틀린 것은?',choices:['물 시료 중 음이온의 정성 및 정량분석에 이용된다.','기본구성은 용리액조, 시료 주입부, 펌프, 분리컬럼, 검출기 및 기록계로 되어있다.','시료의 주입량은 보통 10~100μL 정도이다.','일반적으로 음이온 분석에는 이온교환 검출기를 사용한다.'],answer:3,explain:'일반적으로 음이온 분석에는 전기전도도 검출기를 사용한다.',calc:false},
